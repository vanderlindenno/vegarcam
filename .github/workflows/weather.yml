name: Update Weather

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # ✅ 1. Netatmo ophalen
      - name: Get Netatmo data
        run: |
          echo "Calling Netatmo API..."

          curl -s -H "Authorization: Bearer ${{ secrets.NETATMO_TOKEN }}" \
          https://api.netatmo.com/api/getstationsdata > data.json

          echo "=== API RESPONSE (short) ==="
          jq '.body.devices' data.json

      # ✅ 2. Slim zoeken naar temperatuur & humidity
      - name: Extract current weather (auto-detect)
        run: |
          echo "=== AUTO DETECT DATA ==="

          TEMP=$(jq -r '
            .. | objects | select(has("Temperature")) | .Temperature
          ' data.json | head -n 1)

          HUM=$(jq -r '
            .. | objects | select(has("Humidity")) | .Humidity
          ' data.json | head -n 1)

          echo "TEMP = $TEMP"
          echo "HUM = $HUM"

          if [ -z "$TEMP" ] || [ "$TEMP" = "null" ]; then
            echo "❌ Temperature niet gevonden"
            exit 1
          fi

          if [ -z "$HUM" ] || [ "$HUM" = "null" ]; then
            echo "❌ Humidity niet gevonden"
            exit 1
          fi

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "HUM=$HUM" >> $GITHUB_ENV

      # ✅ 3. Forecast ophalen
      - name: Get forecast data (Met.no)
        run: |
          LAT=52.37
          LON=4.90

          curl -s "https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=$LAT&lon=$LON" \
          -H "User-Agent: github-weather-app" > forecast.json

      # ✅ 4. Forecast uitlezen
      - name: Extract forecast
        run: |
          F_TEMP=$(jq -r '.properties.timeseries[0].data.instant.details.air_temperature' forecast.json)
          F_TIME=$(jq -r '.properties.timeseries[0].time' forecast.json)

          echo "F_TEMP=$F_TEMP" >> $GITHUB_ENV
          echo "F_TIME=$F_TIME" >> $GITHUB_ENV

      # ✅ 5. JSON maken
      - name: Create weather.json
        run: |
          echo "{
            \"temperature\": $TEMP,
            \"humidity\": $HUM,
            \"forecast_temp\": $F_TEMP,
            \"forecast_time\": \"$F_TIME\",
            \"time\": \"$(date '+%Y-%m-%d %H:%M')\"
          }" > weather.json

          cat weather.json

      # ✅ 6. Commit
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add weather.json
          git commit -m "Update weather data" || echo "No changes"
          git push
