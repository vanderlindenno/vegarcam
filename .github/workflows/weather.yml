name: Update Weather

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Get Netatmo data
        run: |
          echo "Calling Netatmo API..."

          curl -s -k -H "Authorization: Bearer ${{ secrets.NETATMO_TOKEN }}" \
          https://api.netatmo.com/api/getstationsdata > data.json

          echo "=== API RESPONSE ==="
          cat data.json

      - name: Extract and create weather.json
        run: |
          TEMP=$(jq -r '.body.devices[0].dashboard_data.Temperature' data.json)
          HUM=$(jq -r '.body.devices[0].dashboard_data.Humidity' data.json)

          if [ "$TEMP" = "null" ] || [ "$HUM" = "null" ]; then
            echo "❌ Data niet gevonden — check API response hierboven"
            exit 1
          fi

          echo "Temperature: $TEMP"
          echo "Humidity: $HUM"

          echo "{
            \"temperature\": $TEMP,
            \"humidity\": $HUM,
            \"time\": \"$(date '+%Y-%m-%d %H:%M')\"
          }" > weather.json

          echo "=== WEATHER.JSON ==="
          cat weather.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add weather.json
          git commit -m "Update weather data" || echo "No changes"
          git push
