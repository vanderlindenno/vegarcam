- name: Get Netatmo data (debug)
  run: |
    echo "Start token request"

    curl -X POST https://api.netatmo.com/oauth2/token \
      -d "grant_type=password" \
      -d "client_id=${{ secrets.NETATMO_CLIENT_ID }}" \
      -d "client_secret=${{ secrets.NETATMO_CLIENT_SECRET }}" \
      -d "username=${{ secrets.NETATMO_USERNAME }}" \
      -d "password=${{ secrets.NETATMO_PASSWORD }}" \
      -d "scope=read_station" > token.json

    echo "Token response:"
    cat token.json

    ACCESS_TOKEN=$(jq -r .access_token token.json)

    echo "Access token is:"
    echo $ACCESS_TOKEN

    curl -H "Authorization: Bearer $ACCESS_TOKEN" \
      https://api.netatmo.com/api/getstationsdata > data.json

    echo "Data response:"
    cat data.json
