name: Update Weather

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ✅ TOKEN
      - name: Get Netatmo token
        run: |
          curl -s -X POST https://api.netatmo.com/oauth2/token \
          -d "grant_type=refresh_token" \
          -d "refresh_token=${{ secrets.NETATMO_REFRESH_TOKEN }}" \
          -d "client_id=${{ secrets.NETATMO_CLIENT_ID }}" \
          -d "client_secret=${{ secrets.NETATMO_CLIENT_SECRET }}" \
          > token.json

          ACCESS_TOKEN=$(jq -r '.access_token' token.json)
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      # ✅ NETATMO
      - name: Get data
        run: |
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
          https://api.netatmo.com/api/getstationsdata > data.json

          TEMP=$(jq -r '.. | objects | select(has("Temperature")) | .Temperature' data.json | head -n 1)
          HUM=$(jq -r '.. | objects | select(has("Humidity")) | .Humidity' data.json | head -n 1)

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "HUM=$HUM" >> $GITHUB_ENV

      # ✅ FORECAST FIXED
      - name: Get forecast
        run: |
          curl -s "https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=58.795&lon=8.79" \
          -H "User-Agent: weather-app" > forecast.json

          jq '[.properties.timeseries
              | .[0:24:4]
              | .[]
              | {time: .time, temp: .data.instant.details.air_temperature}]' \
              forecast.json > forecast_out.json

          cat forecast_out.json

      # ✅ JSON
      - name: Create json
        run: |
          echo "{
            \"temperature\": $TEMP,
            \"humidity\": $HUM,
            \"forecast\": $(cat forecast_out.json),
            \"time\": \"$(date -u '+%Y-%m-%d %H:%M:%S')\"
          }" > weather.json

          cat weather.json

      # ✅ PUSH
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add weather.json
          git commit -m "Update weather" || echo "No changes"
          git push
