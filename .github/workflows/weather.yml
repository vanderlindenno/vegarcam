name: Update Weather JSON

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch weather data
        run: |
          curl "https://api.open-meteo.com/v1/forecast?latitude=58.79&longitude=8.79&current_weather=true" > weather.json

      - name: Create current.json
        run: |
          TEMP=$(jq '.current_weather.temperature' weather.json)
          TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat <<EOF > public/current.json
          {
            "temperature": $TEMP,
            "humidity": 0,
            "pressure": 0,
            "updated": "$TIME"
          }
          EOF

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/current.json
          git commit -m "Update weather data" || echo "No changes"
          git push
