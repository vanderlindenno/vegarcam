name: Update Weather

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ✅ 1. Netatmo token
      - name: Get Netatmo token
        run: |
          curl -s -X POST https://api.netatmo.com/oauth2/token \
            -d "grant_type=refresh_token" \
            -d "refresh_token=${{ secrets.NETATMO_REFRESH_TOKEN }}" \
            -d "client_id=${{ secrets.NETATMO_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.NETATMO_CLIENT_SECRET }}" \
            > token.json

          ACCESS_TOKEN=$(jq -r '.access_token' token.json)

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "❌ Token ophalen mislukt"
            exit 1
          fi

          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      # ✅ 2. Netatmo data (Utendørs)
      - name: Get Netatmo data
        run: |
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
          https://api.netatmo.com/api/getstationsdata > data.json

          TEMP=$(jq -r '
          .body.devices[].modules[]
          | select(.module_name == "Utendørs")
          | .dashboard_data.Temperature
          ' data.json | head -n 1)

          HUM=$(jq -r '
          .body.devices[].modules[]
          | select(.module_name == "Utendørs")
          | .dashboard_data.Humidity
          ' data.json | head -n 1)

          if [ -z "$TEMP" ] || [ "$TEMP" = "null" ]; then
            echo "❌ Utendørs module niet gevonden"
            exit 1
          fi

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "HUM=$HUM" >> $GITHUB_ENV

      # ✅ 3. Forecast (ECHTE 3 DAGEN)
      - name: Get forecast
        run: |
          curl -s "https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=58.795&lon=8.79" \
          -H "User-Agent: github-weather-app" > forecast.json

          jq '
          .properties.timeseries as $ts
          | [
              $ts[4],   # ~12 uur → morgen
              $ts[12],  # ~36 uur → dag 2
              $ts[20]   # ~60 uur → dag 3
            ]
          | map({
              time: .time,
              temp: .data.instant.details.air_temperature,
              min: (.data.next_6_hours.details.air_temperature_min 
                    // .data.instant.details.air_temperature),
              max: (.data.next_6_hours.details.air_temperature_max 
                    // .data.instant.details.air_temperature),
              wind: (.data.instant.details.wind_speed // 0),
              rain: (.data.next_6_hours.details.precipitation_amount // 0),
              uv: (.data.instant.details.ultraviolet_index_clear_sky // 0)
            })
          ' forecast.json > forecast_out.json

          echo "=== FORECAST DEBUG ==="
          cat forecast_out.json

      # ✅ 4. JSON maken
      - name: Create weather.json
        run: |
          echo "{
            \"temperature\": $TEMP,
            \"humidity\": $HUM,
            \"forecast\": $(cat forecast_out.json),
            \"time\": \"$(date -u '+%Y-%m-%d %H:%M:%S')\"
          }" > weather.json

          echo "=== RESULT ==="
          cat weather.json

      # ✅ 5. Commit & push
      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add weather.json
          git commit -m "Update weather data" || echo "No changes"
          git push
