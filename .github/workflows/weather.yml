name: Update Weather

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ✅ Netatmo token
      - name: Get Netatmo token
        run: |
          curl -s -X POST https://api.netatmo.com/oauth2/token \
            -d "grant_type=refresh_token" \
            -d "refresh_token=${{ secrets.NETATMO_REFRESH_TOKEN }}" \
            -d "client_id=${{ secrets.NETATMO_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.NETATMO_CLIENT_SECRET }}" \
            > token.json

          ACCESS_TOKEN=$(jq -r '.access_token' token.json)

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "❌ Token error"
            exit 1
          fi

          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      # ✅ Netatmo (Utendørs)
      - name: Get Netatmo data
        run: |
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
          https://api.netatmo.com/api/getstationsdata > data.json

          TEMP=$(jq -r '
          .body.devices[].modules[]
          | select(.module_name == "Utendørs")
          | .dashboard_data.Temperature' data.json)

          HUM=$(jq -r '
          .body.devices[].modules[]
          | select(.module_name == "Utendørs")
          | .dashboard_data.Humidity' data.json)

          if [ -z "$TEMP" ] || [ "$TEMP" = "null" ]; then
            echo "❌ Utendørs module niet gevonden"
            exit 1
          fi

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "HUM=$HUM" >> $GITHUB_ENV

      # ✅ 5-daagse forecast
      - name: Get forecast
        run: |
          curl -s "https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=58.795&lon=8.79" \
          -H "User-Agent: github-weather-app" > forecast.json

          jq '[
            {time: .properties.timeseries[4].time,  temp: .properties.timeseries[4].data.instant.details.air_temperature},
            {time: .properties.timeseries[12].time, temp: .properties.timeseries[12].data.instant.details.air_temperature},
            {time: .properties.timeseries[20].time, temp: .properties.timeseries[20].data.instant.details.air_temperature},
            {time: .properties.timeseries[28].time, temp: .properties.timeseries[28].data.instant.details.air_temperature},
            {time: .properties.timeseries[36].time, temp: .properties.timeseries[36].data.instant.details.air_temperature}
          ]' forecast.json > forecast_out.json

      # ✅ JSON maken
      - name: Create weather.json
        run: |
          echo "{
            \"temperature\": $TEMP,
            \"humidity\": $HUM,
            \"forecast\": $(cat forecast_out.json),
            \"time\": \"$(date -u '+%Y-%m-%d %H:%M:%S')\"
          }" > weather.json

          cat weather.json

      # ✅ Push
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add weather.json
          git commit -m "Update weather" || echo "No changes"
          git push
