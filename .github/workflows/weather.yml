#################################################
# 🔒 TOEGANG TOT BESTANDEN
#################################################
homeassistant:
  allowlist_external_dirs:
    - "/config/www"

#################################################
# 📄 JSON EXPORT (FILE WRITER)
#################################################
notify:
  - platform: file
    name: weather_export
    filename: /config/www/public/current.json
    timestamp: false

#################################################
# 🌡️ TEMPLATE SENSORS (OPTIONEEL MAAR NETJES)
#################################################
template:
  - sensor:

      - name: "Outdoor Temperature Clean"
        state: "{{ states('sensor.netatmo_outdoor_temperature') | float(0) }}"
        unit_of_measurement: "°C"

      - name: "Outdoor Humidity Clean"
        state: "{{ states('sensor.netatmo_outdoor_humidity') | float(0) }}"
        unit_of_measurement: "%"

      - name: "Outdoor Pressure Clean"
        state: "{{ states('sensor.netatmo_pressure') | float(0) }}"
        unit_of_measurement: "hPa"

#################################################
# 🔁 AUTOMATION (JSON SCHRIJVEN)
#################################################
automation:
  - alias: "Weather JSON Export"
    description: "Schrijft weather data naar JSON voor dashboard"
    mode: single

    trigger:
      - platform: time_pattern
        minutes: "/5"

    action:
      - service: notify.weather_export
        data:
          message: >
            {
              "temperature": {{ states('sensor.outdoor_temperature_clean') | float(0) }},
              "humidity": {{ states('sensor.outdoor_humidity_clean') | float(0) }},
              "pressure": {{ states('sensor.outdoor_pressure_clean') | float(0) }},
              "updated": "{{ now().isoformat() }}"
            }
