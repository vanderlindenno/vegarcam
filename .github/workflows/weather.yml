name: Weather JSON Update

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create JSON file
        run: |
          cat <<EOF > public/current.json
          {
            "temperature": 12.5,
            "humidity": 75,
            "pressure": 1012,
            "updated": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/current.json
          git commit -m "Update weather data" || echo "No changes"
          git push
