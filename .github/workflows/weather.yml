name: Update Weather

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get forecast
        run: |
          curl -s "https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=58.795&lon=8.79" \
          -H "User-Agent: weather-app" > forecast.json

          jq '
          .properties.timeseries

          | map(. + {
              d: ((.time | fromdateiso8601 + 7200) | strftime("%Y-%m-%d")),
              hour: ((.time | fromdateiso8601 + 7200) | strftime("%H") | tonumber)
          })

          | group_by(.d)
          | .[1:4]

          | map({

              date: .[0].d,

              min: (map(.data.instant.details.air_temperature) | min),
              max: (map(.data.instant.details.air_temperature) | max),

              rain: (map(.data.next_1_hours.details.precipitation_amount // 0) | add),

              wind: (map(.data.instant.details.wind_speed) | add / length),

              uv: (map(.data.instant.details.ultraviolet_index_clear_sky // 0) | max),

              sun: (
                map(
                  if (.hour >= 6 and .hour <= 21
                  and (.data.next_1_hours.details.precipitation_amount // 0) == 0)
                  then 1 else 0 end
                ) | add
              ),

              icon: (
                map(.data.next_1_hours.summary.symbol_code // "cloudy")
                | group_by(.)
                | max_by(length)
                | .[0]
              )

          })
          ' forecast.json > forecast_out.json

      - name: Create current JSON (voor jouw HTML)
        run: |
          TEMP=$(jq '.properties.timeseries[0].data.instant.details.air_temperature' forecast.json)
          HUM=$(jq '.properties.timeseries[0].data.instant.details.relative_humidity' forecast.json)
          PRESS=$(jq '.properties.timeseries[0].data.instant.details.air_pressure_at_sea_level' forecast.json)
          TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          mkdir -p public

          echo "{
            \"temperature\": $TEMP,
            \"humidity\": $HUM,
            \"pressure\": $PRESS,
            \"updated\": \"$TIME\"
          }" > public/current.json

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add public/current.json

          git commit -m "update weather" || echo "no change"
          git push
