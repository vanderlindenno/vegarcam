homeassistant:
  allowlist_external_dirs:
    - "/config/www"

notify:
  - platform: file
    name: weather_export
    filename: /config/www/public/current.json
    timestamp: false

automation:
  - alias: "Weather JSON"
    trigger:
      - platform: time_pattern
        minutes: "/5"

    action:
      - service: notify.weather_export
        data:
          message: >
            {
              "temperature": {{ states('sensor.netatmo_outdoor_temperature') | float(0) }},
              "humidity": {{ states('sensor.netatmo_outdoor_humidity') | float(0) }},
              "pressure": {{ states('sensor.netatmo_pressure') | float(0) }},

              "dew_point": {{
                (
                  (237.7 * (
                    (17.27 * states('sensor.netatmo_outdoor_temperature')|float(0)) /
                    (237.7 + states('sensor.netatmo_outdoor_temperature')|float(0))
                    + log(states('sensor.netatmo_outdoor_humidity')|float(0) / 100)
                  ))
                  /
                  (
                    17.27 - (
                      (17.27 * states('sensor.netatmo_outdoor_temperature')|float(0)) /
                      (237.7 + states('sensor.netatmo_outdoor_temperature')|float(0))
                      + log(states('sensor.netatmo_outdoor_humidity')|float(0) / 100)
                    )
                  )
                ) | round(1)
              }},

              "updated": "{{ now().isoformat() }}"
            }
