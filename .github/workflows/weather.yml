name: Update Weather

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ✅ TOKEN
      - name: Get Netatmo token
        run: |
          curl -s -X POST https://api.netatmo.com/oauth2/token \
            -d "grant_type=refresh_token" \
            -d "refresh_token=${{ secrets.NETATMO_REFRESH_TOKEN }}" \
            -d "client_id=${{ secrets.NETATMO_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.NETATMO_CLIENT_SECRET }}" \
            > token.json

          ACCESS_TOKEN=$(jq -r '.access_token' token.json)
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      # ✅ UTENDØRS SENSOR
      - name: Get Netatmo data
        run: |
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
          https://api.netatmo.com/api/getstationsdata > data.json

          TEMP=$(jq -r '.body.devices[].modules[] | select(.module_name=="Utendørs") | .dashboard_data.Temperature' data.json)
          HUM=$(jq -r '.body.devices[].modules[] | select(.module_name=="Utendørs") | .dashboard_data.Humidity' data.json)

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "HUM=$HUM" >> $GITHUB_ENV

      # ✅ ✅ FULL DAY WEATHER ENGINE
      - name: Get forecast (daily aggregated)
        run: |
          curl -s "https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=58.795&lon=8.79" \
          -H "User-Agent: weather-app" > forecast.json

          jq '
          .properties.timeseries

          # ✅ groepeer ALLE data per dag
          | group_by(.time[0:10])

          # ✅ skip vandaag → pak morgen + 2 dagen
          | .[1:4]

          # ✅ bereken alles per dag
          | map({
              date: (.[0].time[0:10]),

              # 🌡️ min/max over HELE dag
              min: (map(.data.instant.details.air_temperature) | min),
              max: (map(.data.instant.details.air_temperature) | max),

              # 🌡️ gemiddelde (optioneel display)
              temp: (map(.data.instant.details.air_temperature) | add / length),

              # 🌧️ regen totaal (alle uren optellen)
              rain: (
                map(.data.next_1_hours.details.precipitation_amount // 0)
                | add
              ),

              # 🌬️ wind gemiddeld
              wind: (
                map(.data.instant.details.wind_speed)
                | add / length
              ),

              # ☀️ UV max van de dag
              uv: (
                map(.data.instant.details.ultraviolet_index_clear_sky // 0)
                | max
              ),

              # 🌦️ BESTE ICON (meest voorkomende)
              icon: (
                map(
                  .data.next_1_hours.summary.symbol_code
                  // .data.next_6_hours.summary.symbol_code
                  // "cloudy"
                )
                | group_by(.)
                | max_by(length)
                | .[0]
              )
          })
          ' forecast.json > forecast_out.json

          echo "=== FORECAST RESULT ==="
          cat forecast_out.json

      # ✅ JSON
      - name: Create weather.json
        run: |
          echo "{
            \"temperature\": $TEMP,
            \"humidity\": $HUM,
            \"forecast\": $(cat forecast_out.json),
            \"time\": \"$(date -u '+%Y-%m-%d %H:%M:%S')\"
          }" > weather.json

          cat weather.json

      # ✅ PUSH
      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add weather.json
          git commit -m "Update weather" || echo "No changes"
          git push
