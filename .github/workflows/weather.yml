name: Update Weather

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get Netatmo token
        run: |
          curl -s -X POST https://api.netatmo.com/oauth2/token \
            -d "grant_type=refresh_token" \
            -d "refresh_token=${{ secrets.NETATMO_REFRESH_TOKEN }}" \
            -d "client_id=${{ secrets.NETATMO_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.NETATMO_CLIENT_SECRET }}" \
            > token.json

          echo "ACCESS_TOKEN=$(jq -r '.access_token' token.json)" >> $GITHUB_ENV

      - name: Get Netatmo data
        run: |
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
          https://api.netatmo.com/api/getstationsdata > data.json

          echo "TEMP=$(jq -r '.body.devices[].modules[].dashboard_data.Temperature' data.json | head -1)" >> $GITHUB_ENV
          echo "HUM=$(jq -r '.body.devices[].modules[].dashboard_data.Humidity' data.json | head -1)" >> $GITHUB_ENV

      - name: Get forecast
        run: |
          curl -s "https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=58.795&lon=8.79" \
          -H "User-Agent: weather-app" > forecast.json

          jq '
          .properties.timeseries
          | map(. + {
              d: ((.time | fromdateiso8601 + 7200) | strftime("%Y-%m-%d"))
          })
          | group_by(.d)
          | .[1:4]
          | map({
              date: .[0].d,
              min: (map(.data.instant.details.air_temperature) | min),
              max: (map(.data.instant.details.air_temperature) | max),
              rain: (map(.data.next_1_hours.details.precipitation_amount // 0) | add),
              wind: (map(.data.instant.details.wind_speed) | add / length),
              uv: (map(.data.instant.details.ultraviolet_index_clear_sky // 0) | max),

              # ✅ echte zonuren
              sun: (
                map(
                  if (.data.next_1_hours.details.precipitation_amount // 0) == 0
                  then 1 else 0 end
                ) | add
              ),

              icon: (
                map(.data.next_1_hours.summary.symbol_code // "cloudy")
                | group_by(.)
                | max_by(length)
                | .[0]
              )
          })
          ' forecast.json > forecast_out.json

      - name: Create JSON
        run: |
          echo "{
            \"temperature\": $TEMP,
            \"humidity\": $HUM,
            \"forecast\": $(cat forecast_out.json)
          }" > weather.json

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add weather.json
          git commit -m "Update weather" || echo "No change"
          git push
