name: Update Weather

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ✅ 1. NIEUW ACCESS TOKEN HALEN (BELANGRIJK)
      - name: Get Netatmo token
        run: |
          echo "Getting new access token..."

          curl -s -X POST https://api.netatmo.com/oauth2/token \
          -d "grant_type=refresh_token" \
          -d "refresh_token=${{ secrets.NETATMO_REFRESH_TOKEN }}" \
          -d "client_id=${{ secrets.NETATMO_CLIENT_ID }}" \
          -d "client_secret=${{ secrets.NETATMO_CLIENT_SECRET }}" \
          > token.json

          cat token.json

          ACCESS_TOKEN=$(jq -r '.access_token' token.json)

          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ Token ophalen mislukt"
            exit 1
          fi

          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV


      # ✅ 2. Netatmo data ophalen
      - name: Get Netatmo data
        run: |
          curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
          https://api.netatmo.com/api/getstationsdata > data.json

          echo "=== DATA ==="
          cat data.json


      # ✅ 3. Data automatisch vinden
      - name: Extract weather
        run: |
          TEMP=$(jq -r '.. | objects | select(has("Temperature")) | .Temperature' data.json | head -n 1)
          HUM=$(jq -r '.. | objects | select(has("Humidity")) | .Humidity' data.json | head -n 1)

          echo "TEMP = $TEMP"
          echo "HUM = $HUM"

          if [ "$TEMP" = "null" ] || [ -z "$TEMP" ]; then
            echo "❌ Geen temperatuur gevonden"
            exit 1
          fi

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "HUM=$HUM" >> $GITHUB_ENV


      # ✅ 4. Forecast ophalen
      - name: Get forecast
        run: |
          curl -s "https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=58.79&lon=8.79" \
          -H "User-Agent: weather-app" > forecast.json

          F_TEMP=$(jq -r '.properties.timeseries[0].data.instant.details.air_temperature' forecast.json)
          F_TIME=$(jq -r '.properties.timeseries[0].time' forecast.json)

          echo "F_TEMP=$F_TEMP" >> $GITHUB_ENV
          echo "F_TIME=$F_TIME" >> $GITHUB_ENV


      # ✅ 5. JSON maken
      - name: Create weather.json
        run: |
          echo "{
            \"temperature\": $TEMP,
            \"humidity\": $HUM,
            \"forecast_temp\": $F_TEMP,
            \"forecast_time\": \"$F_TIME\",
            \"time\": \"$(date '+%Y-%m-%d %H:%M')\"
          }" > weather.json

          cat weather.json


      # ✅ 6. Commit + push
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add weather.json
          git commit -m "Update weather data" || echo "No changes"
          git push
