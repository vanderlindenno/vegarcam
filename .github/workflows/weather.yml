name: Update Weather

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ✅ Netatmo data ophalen
      - name: Get Netatmo data
        run: |
          echo "Calling Netatmo..."

          curl -s -H "Authorization: Bearer ${{ secrets.NETATMO_TOKEN }}" \
          https://api.netatmo.com/api/getstationsdata > data.json

          echo "=== RAW ==="
          cat data.json

      # ✅ Data automatisch vinden (werkt altijd)
      - name: Extract weather
        run: |
          TEMP=$(jq -r '.. | objects | select(has("Temperature")) | .Temperature' data.json | head -n 1)
          HUM=$(jq -r '.. | objects | select(has("Humidity")) | .Humidity' data.json | head -n 1)

          echo "TEMP=$TEMP"
          echo "HUM=$HUM"

          if [ -z "$TEMP" ] || [ "$TEMP" = "null" ]; then
            echo "❌ Token werkt niet of geen data"
            exit 1
          fi

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "HUM=$HUM" >> $GITHUB_ENV

      # ✅ Forecast ophalen
      - name: Get forecast
        run: |
          curl -s "https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=52.37&lon=4.90" \
          -H "User-Agent: weather-app" > forecast.json

          F_TEMP=$(jq -r '.properties.timeseries[0].data.instant.details.air_temperature' forecast.json)
          F_TIME=$(jq -r '.properties.timeseries[0].time' forecast.json)

          echo "F_TEMP=$F_TEMP" >> $GITHUB_ENV
          echo "F_TIME=$F_TIME" >> $GITHUB_ENV

      # ✅ JSON maken
      - name: Create weather.json
        run: |
          echo "{
            \"temperature\": $TEMP,
            \"humidity\": $HUM,
            \"forecast_temp\": $F_TEMP,
            \"forecast_time\": \"$F_TIME\",
            \"time\": \"$(date '+%Y-%m-%d %H:%M')\"
          }" > weather.json

          cat weather.json

      # ✅ Push
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add weather.json
          git commit -m "Update weather" || echo "No changes"
          git push
