name: Update Weather

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # ✅ 1. Netatmo data ophalen
      - name: Get Netatmo data
        run: |
          echo "Calling Netatmo API..."

          curl -s -H "Authorization: Bearer ${{ secrets.NETATMO_TOKEN }}" \
          https://api.netatmo.com/api/getstationsdata > data.json

          echo "=== API RESPONSE ==="
          cat data.json

      # ✅ 2. Extract actuele data (FIXED!)
      - name: Extract current weather
        run: |
          echo "=== PARSING CURRENT DATA ==="

          TEMP=$(jq -r '.body.devices[0].modules[0].dashboard_data.Temperature // .body.devices[0].dashboard_data.Temperature' data.json)
          HUM=$(jq -r '.body.devices[0].modules[0].dashboard_data.Humidity // .body.devices[0].dashboard_data.Humidity' data.json)

          echo "TEMP = $TEMP"
          echo "HUM = $HUM"

          if [ "$TEMP" = "null" ] || [ "$HUM" = "null" ]; then
            echo "❌ Geen geldige Netatmo data"
            exit 1
          fi

          echo "TEMP=$TEMP" >> $GITHUB_ENV
          echo "HUM=$HUM" >> $GITHUB_ENV

      # ✅ 3. Forecast ophalen (Met.no)
      - name: Get forecast data (Met.no)
        run: |
          LAT=52.37
          LON=4.90

          echo "Calling Met.no API..."

          curl -s "https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=$LAT&lon=$LON" \
          -H "User-Agent: github-weather-app" > forecast.json

          echo "=== FORECAST RESPONSE ==="
          cat forecast.json

      # ✅ 4. Forecast extracten
      - name: Extract forecast
        run: |
          echo "=== PARSING FORECAST ==="

          F_TEMP=$(jq -r '.properties.timeseries[0].data.instant.details.air_temperature' forecast.json)
          F_TIME=$(jq -r '.properties.timeseries[0].time' forecast.json)

          echo "Forecast TEMP = $F_TEMP"
          echo "Forecast TIME = $F_TIME"

          if [ "$F_TEMP" = "null" ]; then
            echo "❌ Geen forecast data"
            exit 1
          fi

          echo "F_TEMP=$F_TEMP" >> $GITHUB_ENV
          echo "F_TIME=$F_TIME" >> $GITHUB_ENV

      # ✅ 5. weather.json maken
      - name: Create weather.json
        run: |
          echo "=== WRITING weather.json ==="

          echo "{
            \"temperature\": $TEMP,
            \"humidity\": $HUM,
            \"forecast_temp\": $F_TEMP,
            \"forecast_time\": \"$F_TIME\",
            \"time\": \"$(date '+%Y-%m-%d %H:%M')\"
          }" > weather.json

          cat weather.json

      # ✅ 6. Commit & push
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add weather.json
          git commit -m "Update weather data" || echo "No changes"
          git push
