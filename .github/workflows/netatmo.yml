name: Fetch Netatmo Weather

on:
  schedule:
    - cron: "*/15 * * * *"   # elke 15 min
  workflow_dispatch:

jobs:
  fetch-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Get Netatmo data
        run: |
          curl -X POST "https://api.netatmo.com/oauth2/token" \
          -d "grant_type=refresh_token" \
          -d "refresh_token=${{ secrets.NETATMO_REFRESH_TOKEN }}" \
          -d "client_id=${{ secrets.NETATMO_CLIENT_ID }}" \
          -d "client_secret=${{ secrets.NETATMO_CLIENT_SECRET }}" > token.json

          ACCESS_TOKEN=$(jq -r '.access_token' token.json)

          curl -X GET "https://api.netatmo.com/api/getstationsdata" \
          -H "Authorization: Bearer $ACCESS_TOKEN" > weather.json

      - name: Extract relevant data
        run: |
          TEMP=$(jq '.body.devices[0].dashboard_data.Temperature' weather.json)
          HUM=$(jq '.body.devices[0].dashboard_data.Humidity' weather.json)
          PRESSURE=$(jq '.body.devices[0].dashboard_data.Pressure' weather.json)
          TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "{
            \"temperature\": $TEMP,
            \"humidity\": $HUM,
            \"pressure\": $PRESSURE,
            \"updated\": \"$TIME\"
          }" > public/current.json

      - name: Commit file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/current.json
          git commit -m "Update weather"
          git push
``
