<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Vær Vegår</title>

<style>
body {
  margin:0;
  font-family:-apple-system, sans-serif;
  background:#e9edf3;
  color:#4a5568;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

h2 {
  margin-bottom:20px;
}

.days {
  display:flex;
  gap:20px;
}

/* ✅ CARD */
.day {
  flex:1;
  background:#f4f6fa;
  border-radius:30px;
  padding:25px;
  text-align:center;
  box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

/* eerste dag oranje */
.day:first-child .title {
  color:#f97316;
  font-weight:600;
}

/* titel */
.title {
  font-size:18px;
  margin-bottom:15px;
  color:#6b7280;
  text-transform:capitalize;
}

/* icoon */
.icon {
  width:80px;
  height:80px;
  margin:15px 0;
}

/* temperaturen */
.max {
  font-size:36px;
  font-weight:600;
}

.min {
  font-size:18px;
  color:#9aa3b2;
  margin-bottom:20px;
}

/* rijen */
.row {
  display:flex;
  justify-content:space-between;
  margin:8px 0;
  font-size:14px;
}
</style>

</head>

<body>

<div class="container">

<h2>📍 Vegår</h2>

<div class="days" id="forecast"></div>

</div>

<script>
async function load() {
  const res = await fetch("weather.json");
  const data = await res.json();

  const container = document.getElementById("forecast");
  container.innerHTML = "";

  data.forecast.forEach((d, i) => {

    const date = new Date(d.date);
    const dag = date.toLocaleDateString("no-NO", {
      weekday: "long",
      timeZone: "Europe/Oslo"
    });

    const iconUrl = `https://cdn.jsdelivr.net/gh/metno/weathericons/svg/${d.icon}.svg`;

    // fallback als icon faalt
    const safeIcon = d.icon ? iconUrl : "https://cdn.jsdelivr.net/gh/metno/weathericons/svg/cloudy.svg";

    const sunHours = Math.max(0, 10 - d.rain).toFixed(1);

    // ✅ ALLES BINNEN 1 CARD (dit fix jouw probleem!)
    const html = `
      <div class="day">

        <div class="title">${dag}</div>

        <img src="${safeIcon}" class="iconax">${Math.round(d.max)}°C</div>
        <div class="min">${Math.round(d.min)}°C</div>

        <div class="row">🌧️ <span>${d.rain.toFixed(1)} mm</span></div>
        <div class="row">🌬️ <span>${d.wind.toFixed(1)} m/s</span></div>
        <div class="row">☀️ <span>${sunHours} h</span></div>
        <div class="row">UV <span>${d.uv.toFixed(0)}</span></div>

      </div>
    `;

    container.innerHTML += html;
  });
}

load();
</script>

</body>
</html>
