<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Værmelding</title>

<meta name="version" content="3.2.2">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f2f4f7;

    display: flex;
    flex-direction: column;
    align-items: center;
}

/* HEADER */
header {
    text-align: center;
    margin-top: 20px;
}

.version {
    font-size: 0.75rem;
    color: #888;
}

/* ✅ TITELS PERFECT GELIJK */
.section-title {
    width: 100%;
    max-width: 900px;
    text-align: center;
    font-size: 0.9rem;
    color: #666;
    margin: 20px 0 10px 0;
}

/* WRAPPER */
.wrapper {
    width: 100%;
    max-width: 900px;
}

/* CURRENT */
#current {
    display: flex;
    justify-content: center;
}

/* FORECAST */
.container {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    padding: 20px 0;
}

/* CARDS */
.current-card {
    width: 100%;
    background: white;
    border-radius: 20px;
    padding: 18px;
    text-align: center;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
}

.card {
    flex: 1;
    background: white;
    border-radius: 20px;
    padding: 18px;
    text-align: center;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
}

/* TEXT */
.day {
    color: #f97316;
    font-weight: 600;
    margin-bottom: 10px;
}

.icon {
    font-size: 2.2rem;
    margin: 10px 0;
}

.temp-max {
    font-size: 1.7rem;
    font-weight: bold;
}

.temp-min {
    color: #777;
    margin-bottom: 10px;
}

.row {
    display: flex;
    justify-content: center;
    gap: 8px;
    font-size: 0.9rem;
    margin: 4px 0;
}

.label {
    margin-top: 8px;
    font-size: 0.75rem;
    color: #666;
}
</style>
</head>

<body>

<header>
    🇳🇴 Værmelding
    <div class="version">Versjon 3.2.2</div>
</header>

<div class="wrapper">

    <!-- ✅ TITEL 1 -->
    <div class="section-title">Nåværende måling</div>
    <div id="current"></div>

    <!-- ✅ TITEL 2 (GEFIXT) -->
    <div class="section-title">Værprognose</div>
    <div class="container" id="weather"></div>

</div>

<script>
// (je JS blijft exact hetzelfde)
</script>

</body>
</html>
