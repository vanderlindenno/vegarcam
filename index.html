<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Vær Vegår</title>

<style>
body {
  margin:0;
  font-family:-apple-system, sans-serif;
  background:#e9edf3;
  color:#4a5568;
}

.container {
  max-width:700px;
  margin:auto;
  padding:20px;
}

.days {
  display:flex;
  gap:20px;
}

.day {
  flex:1;
  background:#f4f6fa;
  border-radius:25px;
  padding:20px;
  text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.day:first-child .title {
  color:#f97316; /* oranje eerste dag */
}

.title {
  font-size:18px;
  margin-bottom:10px;
  color:#67748a;
}

.icon {
  width:70px;
  height:70px;
  margin:10px 0;
}

.max {
  font-size:34px;
  font-weight:bold;
}

.min {
  font-size:18px;
  color:#8a94a6;
  margin-bottom:15px;
}

.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:6px 0;
  font-size:14px;
}

.row span {
  font-weight:500;
}

.icon-small {
  width:16px;
  opacity:0.7;
}
</style>

</head>
<body>

<div class="container">

<h2>📍 Vegår</h2>

<div class="days" id="forecast"></div>

</div>

<script>
async function load() {
  const res = await fetch("weather.json");
  const data = await res.json();

  const f = document.getElementById("forecast");
  f.innerHTML = "";

  data.forecast.forEach((d,i) => {

    const date = new Date(d.date);

    const dag = date.toLocaleDateString("no-NO", {
      weekday:"long",
      timeZone:"Europe/Oslo"
    });

    const iconUrl = `https://cdn.jsdelivr.net/gh/metno/weathericons/svg/${d.icon}.svg`;

    // simpele zonuren schatting (bonus)
    const sunHours = Math.max(0, 10 - d.rain).toFixed(1);

    f.innerHTML += `
      <div class="day">

        <div class="title">${dag}</div>

        <img src="${iconUrl}" class="iconax">${d.max.toFixed(0)}°C</div>
        <div class="min">${d.min.toFixed(0)}°C</div>

        <div class="row">
          🌧️ <span>${d.rain.toFixed(1)} mm</span>
        </div>

        <div class="row">
          🌬️ <span>${d.wind.toFixed(1)} m/s</span>
        </div>

        <div class="row">
          ☀️ <span>${sunHours} h</span>
        </div>

        <div class="row">
          UV <span>${d.uv.toFixed(0)}</span>
        </div>

      </div>
    `;
  });
}

load();
</script>

</body>
</html>
