<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Vær Vegår</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:-apple-system, sans-serif;
  background:#e9edf3;
  color:#4a5568;
}

.container {
  max-width:900px;
  margin:auto;
  padding:15px;
}

h2 {
  margin-bottom:15px;
}

/* current */
.current {
  background:#f4f6fa;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

.temp {
  font-size:40px;
  font-weight:bold;
}

.meta {
  font-size:14px;
}

/* forecast */
.days {
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.day {
  flex:1;
  min-width:220px;
  background:#f4f6fa;
  border-radius:25px;
  padding:20px;
  text-align:center;
}

.day:first-child .title {
  color:#f97316;
}

.title {
  font-size:18px;
  margin-bottom:10px;
}

.icon {
  width:60px;
  height:60px;
}

.row {
  display:flex;
  justify-content:space-between;
  font-size:13px;
}

/* version */
.version {
  margin-top:30px;
  font-size:12px;
  text-align:center;
  color:#999;
}

/* mobile */
@media (max-width:600px) {
  .days {
    flex-direction:column;
  }
}
</style>

</head>

<body>

<div class="container">

<h2>📍 Vegår</h2>

<div id="current" class="current">Laster...</div>

<div class="days" id="forecast"></div>

<div class="version" id="version"></div>

</div>

<script>
async function load() {
  const res = await fetch("weather.json");
  const data = await res.json();

  // ✅ current
  const now = document.getElementById("current");

  now.innerHTML = `
    <div>Nå</div>
    <div class="temp">${Math.round(data.temperature)}°C</div>
    <div class="meta">💧 ${data.humidity}%</div>
  `;

  // ✅ forecast
  const f = document.getElementById("forecast");
  f.innerHTML = "";

  data.forecast.forEach((d,i) => {

    const date = new Date(d.date);

    const dag = date.toLocaleDateString("no-NO", {
      weekday:"long",
      timeZone:"Europe/Oslo"
    });

    const iconUrl = `https://cdn.jsdelivr.net/gh/metno/weathericons/svg/${d.icon || "cloudy"}.svg`;

    const sunHours = Math.max(0, 10 - d.rain).toFixed(1);

    f.innerHTML += `
      <div class="day">
        <div class="title">${dag}</div>
        <img src="${iconUrl}" class="Math.round(d.max)}°C</b></div>
        <div>${Math.round(d.min)}°C</div>

        <div class="row">🌧️ ${d.rain.toFixed(1)} mm</div>
        <div class="row">🌬️ ${d.wind.toFixed(1)} m/s</div>
        <div class="row">☀️ ${sunHours} h</div>
        <div class="row">UV ${d.uv.toFixed(0)}</div>
      </div>
    `;
  });

  // ✅ VERSION (timestamp)
  const v = document.getElementById("version");
  const version = new Date().toISOString();

  v.innerText = "Versjon: " + version;
}

load();
</script>

</body>
</html>
