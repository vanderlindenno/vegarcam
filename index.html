<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Værmelding</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f2f4f7;
}

/* LAYOUT */
.wrapper{
    max-width:1200px;
    margin:auto;
    padding:14px;
}

/* HEADER */
header{
    text-align:center;
    margin:20px 0;
    font-weight:600;
}

/* CARDS */
.cardbox{
    background:white;
    border-radius:20px;
    box-shadow:0 6px 18px rgba(0,0,0,0.06);
    padding:18px;
}

/* CURRENT */
.current-grid{
    display:flex;
    gap:20px;
    align-items:flex-start;
}

.left{
    min-width:200px;
}

.right{
    flex:1;
    max-width:600px;
}

.temp{font-size:2.6rem;font-weight:bold;}
.label{font-size:.8rem;color:#666;margin-top:6px;}
.day{color:#f97316;font-weight:bold;}
.icon{font-size:2rem;}

/* FORECAST */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:14px;
}

.forecast{
    text-align:center;
}

/* HISTORY */
#historyChart{height:260px!important}

/* MOBILE FIX ✅ */
@media(max-width:700px){

.current-grid{
    flex-direction:column;
}

.left,.right{
    width:100%;
    max-width:100%;
}

.left{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.left .temp{
    grid-column:span 2;
}

}

</style>
</head>

<body>

<header>
🇳🇴 Værmelding
<div class="label">v25 final</div>
</header>

<div class="wrapper">

<h4>Nå situasjon</h4>
<div id="current"></div>

<h4>Værprognose</h4>
<div id="weather" class="container"></div>

<h4>Historisk vær</h4>
<div class="cardbox">
<canvas id="historyChart"></canvas>
</div>

</div>

<script>

Chart.defaults.devicePixelRatio = 2;

function icon(c){
if(c===0)return"☀️";
if(c<=3)return"🌤️";
if(c<=48)return"☁️";
if(c<=67)return"🌧️";
return"🌥️";
}

const lat=58.79,lon=8.79;

const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,uv_index_max&timezone=Europe%2FOslo`;

async function init(){

const [cRes,fRes]=await Promise.all([
fetch("public/current.json"),
fetch(url)
]);

const c=await cRes.json();
const d=await fRes.json();

/* FEELS LIKE */
const feels=(c.temperature-(1-c.humidity/100)*2).toFixed(1);

/* CURRENT */
document.getElementById("current").innerHTML=`
<div class="cardbox">
<div class="current-grid">

<div class="left">

<div class="day">Nåværende måling</div>
<div class="icon">${icon(d.daily.weathercode[0])}</div>

<div class="temp">${Math.round(c.temperature)}°C</div>

<div class="label">🌡️ Føles som ${feels}°</div>
<div class="label">💧 ${c.humidity}%</div>
<div class="label">📊 ${c.pressure||"--"} hPa</div>
<div class="label">💨 ${c.wind||"--"} m/s</div>

<div class="label">
Oppdatert ${new Date(c.updated).toLocaleTimeString("no-NO")}
</div>

</div>

<div class="right">
<canvas id="chart"></canvas>
</div>

</div>
</div>`;

/* CHART */
const now=new Date().getHours();

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:d.hourly.time.slice(now,now+12).map(t=>new Date(t).getHours()),
datasets:[{
data:d.hourly.temperature_2m.slice(now,now+12),
borderColor:"#f97316",
borderWidth:3,
pointRadius:4,
tension:0.4,
fill:true
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}},
scales:{x:{grid:{display:false}},y:{display:false}}
}
});

/* FORECAST */
for(let i=1;i<=3;i++){

document.getElementById("weather").innerHTML+=`
<div class="cardbox forecast">
<div class="day">${new Date(d.daily.time[i]).toLocaleDateString("no-NO",{weekday:"long"})}</div>
<div class="icon">${icon(d.daily.weathercode[i])}</div>

<div><b>${Math.round(d.daily.temperature_2m_max[i])}°</b></div>
<div>${Math.round(d.daily.temperature_2m_min[i])}°</div>

<div class="label">
🌧️ ${d.daily.precipitation_sum[i]} mm<br>
💨 ${d.daily.windspeed_10m_max[i]} m/s<br>
UV ${d.daily.uv_index_max[i]}
</div>
</div>`;
}

}

/* HISTORY */
async function history(){

const r=await fetch("public/history.json");
const h=await r.json();

const today=new Date();

const idx=h.daily.time.findIndex(t=>{
const d=new Date(t);
return d.getDate()==today.getDate() &&
d.getMonth()==today.getMonth();
});

new Chart(document.getElementById("historyChart"),{

data:{
labels:h.daily.time.map(d=>new Date(d).toLocaleDateString()),
datasets:[
{
type:"line",
data:h.daily.temperature_2m_mean,
borderColor:"#ef4444",
borderWidth:2,
tension:0.4,
pointRadius:0
},
{
type:"bar",
data:h.daily.precipitation_sum,
backgroundColor:"rgba(59,130,246,0.2)"
}
]
},

options:{
plugins:{legend:{display:false}},
scales:{x:{grid:{display:false}}}
},

plugins:[{
afterDraw(c){

if(idx==-1)return;

const {ctx,chartArea:{top,bottom},scales:{x}}=c;
const xPos=x.getPixelForValue(idx);

ctx.fillStyle="rgba(249,115,22,0.1)";
ctx.fillRect(xPos-10,top,20,bottom-top);

ctx.beginPath();
ctx.moveTo(xPos,top);
ctx.lineTo(xPos,bottom);
ctx.strokeStyle="#f97316";
ctx.stroke();
}
}]
});

}

init();
history();

</script>

</body>
</html>
