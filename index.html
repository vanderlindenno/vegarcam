<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Værmelding</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f2f4f7;
    display:flex;
    flex-direction:column;
    align-items:center;
}

header {
    text-align:center;
    margin-top:20px;
}

.wrapper { max-width:900px; width:100%; }

.current-card {
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 8px 18px rgba(0,0,0,0.08);
    margin-top:10px;
}

/* RADAR */
.radar-card {
    position: relative;
    overflow: hidden;
    padding: 0;
}

.radar-card iframe {
    width:100%;
    height:420px;
    border:none;
}

/* tooltip overlay */
.radar-overlay {
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.6);
    color:white;
    padding:6px 10px;
    border-radius:10px;
    font-size:0.8rem;
}

/* alert */
.alert {
    margin-top:10px;
    padding:10px;
    border-radius:12px;
    font-size:0.9rem;
    text-align:center;
}

.alert.rain {
    background:#e0f2fe;
    color:#0369a1;
}

.container {
    display:flex;
    gap:16px;
    margin-top:20px;
}

.card {
    flex:1;
    background:white;
    border-radius:20px;
    padding:16px;
    text-align:center;
    box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.temp-max { font-size:1.6rem; font-weight:bold; }
.temp-min { color:#777; }

.label { font-size:0.75rem; color:#666; }
</style>
</head>

<body>

<header>
    🇳🇴 Værmelding
    <div class="label">Versjon 14.0</div>
</header>

<div class="wrapper">

<h4>Værprognose</h4>
<div class="container" id="weather"></div>

<div id="rainAlert"></div>

<h4>Nedbør radar</h4>
<div class="current-card radar-card">

    <div class="radar-overlay">
        🌧️ Live nedbør radar
    </div>

    <iframe 
    src="https://embed.windy.com/embed2.html?lat=58.79&lon=8.79&zoom=7&overlay=rain&level=surface&menu=&message=true">
    </iframe>

</div>

</div>

<script>

// kleur
function getTempColor(t){
    if(t<=0) return "#3b82f6";
    if(t<=10) return "#60a5fa";
    if(t<=20) return "#f97316";
    return "#ef4444";
}

// tekst
function getSkyText(c){
    if(c<20) return "Skyfri";
    if(c<50) return "Delvis skyet";
    if(c<80) return "Skyet";
    return "Overskyet";
}

// icoon
function getIcon(code){
    if(code === 0) return "☀️";
    if(code <= 3) return "🌤️";
    if(code <= 48) return "☁️";
    if(code <= 67) return "🌧️";
    return "🌥️";
}

const lat=58.79, lon=8.79;

const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=precipitation&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,cloudcover_mean&timezone=Europe%2FOslo`;

async function init(){

const res = await fetch(url);
const data = await res.json();

//////////////////////////////////////////////////
// 🌧️ FORECAST (kort)
//////////////////////////////////////////////////

const container = document.getElementById("weather");
container.innerHTML="";

for(let i=1;i<=3;i++){

const max=data.daily.temperature_2m_max[i];
const min=data.daily.temperature_2m_min[i];
const cloud=data.daily.cloudcover_mean[i];

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div>${new Date(data.daily.time[i]).toLocaleDateString("no-NO",{weekday:"long"})}</div>
<div>${getIcon(data.daily.weathercode[i])}</div>
<div class="temp-max" style="color:${getTempColor(max)}">${Math.round(max)}°</div>
<div class="temp-min">${Math.round(min)}°</div>
<div class="label">${getSkyText(cloud)}</div>
`;

container.appendChild(card);
}

//////////////////////////////////////////////////
// 🌧️ REGEN ALERT (nieuw!)
//////////////////////////////////////////////////

const rainNext = data.hourly.precipitation.slice(0,6);

const rainComing = rainNext.some(v => v > 0.5);

if(rainComing){
    document.getElementById("rainAlert").innerHTML = `
    <div class="alert rain">
    🌧️ Regn sannsynlig innen 6 timer
    </div>
    `;
}

}

init();

</script>

</body>
</html>
