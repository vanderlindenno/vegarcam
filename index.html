<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Værmelding</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f2f4f7;
}

.wrapper{
    max-width:1200px;
    margin:auto;
    padding:14px;
}

header{
    text-align:center;
    margin:20px 0;
}

.card{
    background:#fff;
    border-radius:20px;
    padding:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.current{
    display:flex;
    gap:20px;
}

.left{min-width:220px;}
.icon-big{font-size:2.4rem;}
.temp{font-size:2.6rem;font-weight:bold;}
.label{font-size:0.85rem;color:#666;}
.right{flex:1;}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:12px;
}

/* LIVE DOT */
.live-dot{
  width:8px;
  height:8px;
  background:#22c55e;
  border-radius:50%;
  display:inline-block;
  margin-left:6px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

@media(max-width:700px){
.current{flex-direction:column;}
}
</style>
</head>

<body>

<header>
🇳🇴 Værmelding<br>
<small>Live værdata</small>
</header>

<div class="wrapper">

<h4>Nå situasjon</h4>
<div id="current"></div>

<h4>Værprognose</h4>
<div id="forecast" class="grid"></div>

</div>

<script>
Chart.defaults.devicePixelRatio = 2;

/* ICONS */
function getWeatherIcon(code){
if(code===0)return"☀️";
if(code<=2)return"🌤️";
if(code===3)return"☁️";
if(code>=45&&code<=48)return"🌫️";
if(code>=61&&code<=67)return"🌧️";
if(code>=71)return"❄️";
if(code>=95)return"⛈️";
return"🌥️";
}

const url = `https://api.open-meteo.com/v1/forecast?latitude=58.79&longitude=8.79&hourly=temperature_2m,relative_humidity_2m,windspeed_10m,surface_pressure&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Europe%2FOslo`;

async function loadWeather(){
const res = await fetch(url);
return await res.json();
}

async function init(){

const data = await loadWeather();
const now = new Date().getHours();

const temp = data.hourly.temperature_2m[now];
const humidity = data.hourly.relative_humidity_2m[now];
const wind = data.hourly.windspeed_10m[now];
const pressure = data.hourly.surface_pressure[now];

const updated = new Date().toLocaleTimeString("no-NO");

/* CURRENT */
document.getElementById("current").innerHTML=`
<div class="card current">

<div class="left">
<div>
Nu <span class="live-dot"></span>
</div>

<div class="label">Oppdatert: ${updated}</div>

<div class="icon-big">${getWeatherIcon(data.daily.weathercode[0])}</div>
<div class="temp">${Math.round(temp)}°C</div>

<div class="label">💧 ${humidity}%</div>
<div class="label">💨 ${wind} m/s</div>
<div class="label">📊 ${pressure} hPa</div>
</div>

<div class="right">
<canvas id="chart"></canvas>
</div>

</div>`;

/* CHART */
new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:data.hourly.time.slice(now,now+12).map(t=>new Date(t).getHours()),
datasets:[{
data:data.hourly.temperature_2m.slice(now,now+12),
borderColor:"#f97316",
borderWidth:3,
tension:0.4,
fill:true
}]
},
options:{
plugins:{legend:{display:false}},
scales:{x:{grid:{display:false}},y:{display:false}}
}
});

/* FORECAST */
let html="";
for(let i=1;i<=4;i++){
html+=`
<div class="card">
<b>${new Date(data.daily.time[i]).toLocaleDateString("no-NO",{weekday:"long"})}</b>
<div style="font-size:1.5rem;">
${getWeatherIcon(data.daily.weathercode[i])}
</div>
<div>
${Math.round(data.daily.temperature_2m_max[i])}° / ${Math.round(data.daily.temperature_2m_min[i])}°
</div>
</div>`;
}
document.getElementById("forecast").innerHTML = html;

}

/* AUTO REFRESH elke 10 min */
setInterval(init, 10 * 60 * 1000);

init();
</script>

</body>
</html>
