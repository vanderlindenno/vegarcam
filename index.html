<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Værmelding</title>

https://cdn.jsdelivr.net/npm/chart.js>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f2f4f7;
    display: flex;
    flex-direction: column;
    align-items: center;
}

header {
    text-align: center;
    margin-top: 20px;
}

.version {
    font-size: 0.75rem;
    color: #888;
}

.section-title {
    color: #666;
    margin-top: 20px;
}

/* WRAPPER */
.wrapper {
    width: 100%;
    max-width: 900px;
}

/* CURRENT CARD */
.current-card {
    width: 100%;
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
}

/* GRID */
.current-grid {
    display: flex;
    gap: 30px;
    align-items: center;
}

/* LEFT SIDE */
.left {
    flex: 0 0 220px;
}

.day {
    color: #f97316;
    font-weight: bold;
    font-size: 1.2rem;
}

.icon {
    font-size: 2.5rem;
    margin: 5px 0;
}

.temp {
    font-size: 2.8rem;
    font-weight: bold;
}

.row {
    font-size: 0.95rem;
    margin: 4px 0;
}

/* RIGHT GRAPH */
.right {
    flex: 1;
}

.right canvas {
    width: 100%;
    height: 180px !important;
}

/* FORECAST */
.container {
    display: flex;
    gap: 16px;
    margin-top: 20px;
}

.card {
    flex: 1;
    background: white;
    border-radius: 20px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
}

.label {
    font-size: 0.75rem;
    color: #666;
}
</style>
</head>

<body>

<header>
    🇳🇴 Værmelding
    <div class="version">Versjon 5.0</div>
</header>

<div class="wrapper">

<div class="section-title">Nåværende måling</div>
<div id="current"></div>

<div class="section-title">Værprognose</div>
<div class="container" id="weather"></div>

</div>

<script>

const lat = 58.79;
const lon = 8.79;

const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Europe%2FOslo`;

function getIcon(code){
    if(code === 0) return "☀️";
    if(code <= 3) return "🌤️";
    if(code <= 48) return "☁️";
    if(code <= 67) return "🌧️";
    return "🌥️";
}

function formatDay(date){
    return new Date(date).toLocaleDateString("no-NO",{weekday:"long"});
}

// CURRENT
fetch("public/current.json")
.then(r=>r.json())
.then(data=>{

    const updated = new Date(data.updated).toLocaleTimeString("no-NO");

    document.getElementById("current").innerHTML = `
    <div class="current-card">

        <div class="current-grid">

            <div class="left">
                <div class="day">I dag</div>
                <div class="icon">🌤️</div>
                <div class="temp">${Math.round(data.temperature)}°C</div>

                <div class="row">🌡️ Føles som ${data.feels_like ?? data.temperature}°C</div>
                <div class="row">💧 ${data.humidity}%</div>
                <div class="row">🌫️ Duggpunkt ${data.dew_point ?? "--"}°C</div>
                <div class="row">📊 ${data.pressure} hPa</div>
            </div>

            <div class="right">
                <canvas id="chart"></canvas>
            </div>

        </div>

        <div class="label">Oppdatert ${updated}</div>

    </div>
    `;
});

// FORECAST + GRAPH
fetch(url)
.then(r=>r.json())
.then(data=>{

    const now = new Date().getHours();

    const temps = data.hourly.temperature_2m.slice(now, now+12);
    const times = data.hourly.time.slice(now, now+12)
        .map(t=> new Date(t).getHours());

    new Chart(document.getElementById("chart"),{
        type:"line",
        data:{
            labels:times,
            datasets:[{
                data:temps,
                borderColor:"#f97316",
                backgroundColor:"rgba(249,115,22,0.2)",
                fill:true,
                tension:0.4,
                pointRadius:2
            }]
        },
        options:{
            plugins:{legend:{display:false}},
            scales:{y:{display:false}}
        }
    });

    const container = document.getElementById("weather");

    for(let i=0;i<3;i++){
        const card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <div class="day">${formatDay(data.daily.time[i])}</div>
            <div class="icon">${getIcon(data.daily.weathercode[i])}</div>
            <div class="temp">${Math.round(data.daily.temperature_2m_max[i])}°</div>
            <div>${Math.round(data.daily.temperature_2m_min[i])}°</div>
        `;

        container.appendChild(card);
    }

});
</script>

</body>
</html>
