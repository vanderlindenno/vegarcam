<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Værmelding</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f2f4f7;
}

.wrapper{
    max-width:1200px;
    margin:auto;
    padding:14px;
}

header{
    text-align:center;
    margin:20px 0;
}

/* CARDS */
.card{
    background:#fff;
    padding:18px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

/* CURRENT */
.current{
    display:flex;
    gap:20px;
}

.left{
    min-width:200px;
}

.right{
    flex:1;
    max-width:600px;
}

.temp{
    font-size:2.6rem;
    font-weight:bold;
}

.label{
    color:#666;
    font-size:0.85rem;
}

/* FORECAST */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:12px;
}

/* MOBILE */
@media(max-width:700px){

.current{
    flex-direction:column;
}

.left{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.left .temp{
    grid-column:span 2;
}

}

</style>
</head>

<body>

<header>
🇳🇴 Værmelding<br>
<small>v26 stabiel</small>
</header>

<div class="wrapper">

<h4>Nå situasjon</h4>
<div id="current"></div>

<h4>Værprognose</h4>
<div id="forecast" class="grid"></div>

<h4>Historisk vær</h4>
<div class="card">
<canvas id="historyChart"></canvas>
</div>

<h4>Radar</h4>
<div class="card">
<iframe src="https://embed.windy.com/embed2.html?lat=58.79&lon=8.79&zoom=12&overlay=radar"></iframe>
</div>

</div>

<script>

Chart.defaults.devicePixelRatio = 2;

/* HELPERS */
function icon(c){
if(c===0)return"☀️";
if(c<=3)return"🌤️";
if(c<=48)return"☁️";
if(c<=67)return"🌧️";
return"🌥️";
}

const url=`https://api.open-meteo.com/v1/forecast?latitude=58.79&longitude=8.79&hourly=temperature_2m&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,uv_index_max&timezone=Europe%2FOslo`;

async function loadWeather(){

let data;
const cached = localStorage.getItem("weather");

if(cached){
    data = JSON.parse(cached);
}else{
    try{
        const res = await fetch(url);
        if(!res.ok) throw new Error();
        data = await res.json();
        localStorage.setItem("weather", JSON.stringify(data));
    }catch{
        console.warn("Fallback data gebruikt");
        data = {
            hourly:{temperature_2m:Array(24).fill(10),time:Array(24).fill(new Date())},
            daily:{
                weathercode:[1,2,3],
                temperature_2m_max:[15,18,17],
                temperature_2m_min:[8,9,7],
                precipitation_sum:[0,3,5],
                windspeed_10m_max:[3,5,6],
                uv_index_max:[2,3,4],
                time:[
                    new Date(),
                    new Date(Date.now()+86400000),
                    new Date(Date.now()+172800000)
                ]
            }
        };
    }
}

return data;
}

async function init(){

const data = await loadWeather();

/* CURRENT */
const temp = data.hourly.temperature_2m[new Date().getHours()];

document.getElementById("current").innerHTML=`
<div class="card current">

<div class="left">
<div>Nu</div>
<div class="temp">${Math.round(temp)}°C</div>

<div class="label">💧 --%</div>
<div class="label">💨 -- m/s</div>
<div class="label">📊 -- hPa</div>
</div>

<div class="right">
<canvas id="chart"></canvas>
</div>

</div>`;

/* GRAPH */
new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:data.hourly.time.slice(0,12).map(t=>new Date(t).getHours()),
datasets:[{
data:data.hourly.temperature_2m.slice(0,12),
borderColor:"#f97316",
borderWidth:3,
tension:0.4,
fill:true
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}},
scales:{x:{grid:{display:false}},y:{display:false}}
}
});

/* FORECAST */
let html="";
for(let i=1;i<=3;i++){
html+=`
<div class="card">
<div><b>${new Date(data.daily.time[i]).toLocaleDateString("no-NO",{weekday:"long"})}</b></div>
<div>${icon(data.daily.weathercode[i])}</div>
<div>${Math.round(data.daily.temperature_2m_max[i])}° / ${Math.round(data.daily.temperature_2m_min[i])}°</div>

<div class="label">
🌧️ ${data.daily.precipitation_sum[i]} mm<br>
💨 ${data.daily.windspeed_10m_max[i]} m/s<br>
UV ${data.daily.uv_index_max[i]}
</div>

</div>`;
}
document.getElementById("forecast").innerHTML=html;

}

async function history(){

try{
const r=await fetch("public/history.json");
const h=await r.json();

new Chart(document.getElementById("historyChart"),{
data:{
labels:h.daily.time.map(d=>new Date(d).toLocaleDateString()),
datasets:[
{
type:"line",
data:h.daily.temperature_2m_mean,
borderColor:"#ef4444",
tension:0.4,
pointRadius:0
},
{
type:"bar",
data:h.daily.precipitation_sum,
backgroundColor:"rgba(59,130,246,0.2)"
}
]
},
options:{plugins:{legend:{display:false}}}
});

}catch{
console.warn("history niet geladen");
}

}

init();
history();

</script>

</body>
</html>
