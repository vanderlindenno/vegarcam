<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Værmelding – Norge</title>

<!-- Version -->
<meta name="version" content="1.0.0">

<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        margin: 0;
        background: linear-gradient(to bottom, #2c5364, #0f2027);
        color: white;
    }

    header {
        padding: 16px;
        text-align: center;
        font-size: 1.4rem;
        font-weight: bold;
    }

    .version {
        font-size: 0.7rem;
        opacity: 0.6;
    }

    .container {
        padding: 12px;
    }

    .card {
        background: rgba(255,255,255,0.08);
        border-radius: 18px;
        padding: 16px;
        margin-bottom: 12px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .day {
        font-size: 1.2rem;
        margin-bottom: 10px;
    }

    .weather-main {
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .temp {
        font-size: 2rem;
        font-weight: bold;
    }

    .details {
        margin-top: 10px;
        font-size: 0.9rem;
        opacity: 0.9;
    }

    .icon {
        font-size: 2rem;
    }
</style>
</head>

<body>

<header>
    🇳🇴 Værmelding (3 dager)
    <div class="version">Versjon 1.0.0</div>
</header>

<div class="container" id="weather"></div>

<script>

// 🔹 Locatie (vast)
const lat = 58.79492656129151;
const lon = 8.790772896300094;

// 🔹 API URL (met juiste timezone)
const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max&timezone=Europe%2FOslo`;

// 🔹 Weer icoontjes mapping
function getIcon(code){
    if(code === 0) return "☀️";
    if(code <= 3) return "⛅";
    if(code <= 48) return "☁️";
    if(code <= 67) return "🌧️";
    if(code <= 77) return "❄️";
    if(code <= 82) return "🌦️";
    if(code >= 95) return "⛈️";
    return "🌍";
}

// 🔹 Datum formatter
function formatDate(dateStr){
    const date = new Date(dateStr + "T12:00:00");
    return date.toLocaleDateString("no-NO", {
        weekday: "long",
        day: "numeric",
        month: "long"
    });
}

// 🔹 Data ophalen
fetch(url)
.then(res => res.json())
.then(data => {

    const container = document.getElementById("weather");

    for(let i = 0; i < 3; i++){
        const day = document.createElement("div");
        day.className = "card";

        day.innerHTML = `
            <div class="day">${formatDate(data.daily.time[i])}</div>

            <div class="weather-main">
                <div class="temp">
                    ${Math.round(data.daily.temperature_2m_max[i])}° / 
                    ${Math.round(data.daily.temperature_2m_min[i])}°
                </div>
                <div class="icon">
                    ${getIcon(data.daily.weathercode[i])}
                </div>
            </div>

            <div class="details">
                💧 Nedbør: ${data.daily.precipitation_sum[i]} mm<br>
                💨 Vind: ${data.daily.windspeed_10m_max[i]} km/t<br>
                🕒 Tidsone: Europe/Oslo (UTC+1 / UTC+2)
            </div>
        `;

        container.appendChild(day);
    }

})
.catch(err => {
    document.getElementById("weather").innerHTML = "Kunne ikke hente værdata.";
    console.error(err);
});

</script>

</body>
</html>
