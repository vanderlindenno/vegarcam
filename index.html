<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Værmelding</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f2f4f7;
    display:flex;
    flex-direction:column;
    align-items:center;
}

header {
    text-align:center;
    margin-top:20px;
}

.wrapper { max-width:900px; width:100%; }

.current-card {
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 8px 18px rgba(0,0,0,0.08);
    margin-top:12px;
}

.current-grid {
    display:flex;
    gap:30px;
    align-items:center;
}

.left { flex:0 0 220px; }
.right { flex:1; }

.right canvas {
    width:100%;
    height:200px !important;
}

/* HISTORIE */
.history-card {
    display:flex;
    justify-content:center;
    padding:30px;
}

#historyChart {
    width:100%;
    max-width:800px;
    height:240px !important;
}

/* RADAR */
.radar-card {
    position:relative;
    padding:0;
    overflow:hidden;
}

.radar-card iframe {
    width:100%;
    height:420px;
    border:none;
}

.radar-overlay {
    position:absolute;
    top:12px;
    left:12px;
    background:rgba(0,0,0,0.6);
    color:white;
    padding:6px 10px;
    border-radius:10px;
    font-size:0.8rem;
}

/* TEXT */
.temp { font-size:3rem; font-weight:bold; }
.day { color:#f97316; font-weight:bold; }
.icon { font-size:2.5rem; margin:5px 0; }

.row { font-size:0.9rem; margin:4px 0; }
.label { font-size:0.75rem; color:#666; }

.container {
    display:flex;
    gap:16px;
    margin-top:20px;
}

.card {
    flex:1;
    background:white;
    border-radius:20px;
    padding:16px;
    text-align:center;
    box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.temp-max { font-size:1.6rem; font-weight:bold; }
.temp-min { color:#777; }

</style>
</head>

<body>

<header>
🇳🇴 Værmelding
<div class="label">Versjon 17.0</div>
</header>

<div class="wrapper">

<h4>Nåværende måling</h4>
<div id="current"></div>

<h4>Værprognose</h4>
<div id="weather" class="container"></div>

<h4>Historisk vær fra i fjor</h4>
<div class="current-card history-card">
<canvas id="historyChart"></canvas>
</div>

<h4>Nedbør radar</h4>
<div class="current-card radar-card">
<div class="radar-overlay">🌧️ Live nedbør radar</div>

<iframe src="https://embed.windy.com/embed2.html?lat=58.79&lon=8.79&zoom=12&overlay=satellite&level=surface&menu=&message=true"></iframe>

</div>

</div>

<script>

function getTempColor(t){
if(t<=0) return "#3b82f6";
if(t<=10) return "#60a5fa";
if(t<=20) return "#f97316";
return "#ef4444";
}

function getSkyText(c){
if(c<20) return "Skyfri";
if(c<50) return "Delvis skyet";
if(c<80) return "Skyet";
return "Overskyet";
}

function getIcon(code){
if(code === 0) return "☀️";
if(code <= 3) return "🌤️";
if(code <= 48) return "☁️";
if(code <= 67) return "🌧️";
return "🌥️";
}

const lat=58.79, lon=8.79;

const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,uv_index_max,cloudcover_mean&timezone=Europe%2FOslo`;

async function init(){

const [cRes,fRes]=await Promise.all([
fetch("public/current.json"),
fetch(url)
]);

const current=await cRes.json();
const data=await fRes.json();

// ✅ feels-like
const feels = (current.temperature - (1 - current.humidity/100)*2).toFixed(1);

// CURRENT
document.getElementById("current").innerHTML=`
<div class="current-card">
<div class="current-grid">

<div class="left">
<div class="day">I dag</div>
<div class="icon">${getIcon(data.daily.weathercode[0])}</div>

<div class="temp" style="color:${getTempColor(current.temperature)}">
${Math.round(current.temperature)}°C
</div>

<div class="row">🌡️ Føles som ${feels}°</div>
<div class="row">💧 ${current.humidity}%</div>
<div class="row">📊 ${current.pressure || "--"} hPa</div>
</div>

<div class="right">
<canvas id="chart"></canvas>
</div>

</div>

<div class="label">
Oppdatert ${new Date(current.updated).toLocaleTimeString("no-NO")}
</div>
</div>
`;

// GRAFIEK
const now=new Date().getHours();
const temps=data.hourly.temperature_2m.slice(now,now+12);
const times=data.hourly.time.slice(now,now+12)
.map(t=>new Date(t).getHours());

const ctx=document.getElementById("chart").getContext("2d");

const gradient=ctx.createLinearGradient(0,0,0,200);
gradient.addColorStop(0,"rgba(249,115,22,0.5)");
gradient.addColorStop(1,"rgba(249,115,22,0)");

new Chart(ctx,{
type:"line",
data:{
labels:times,
datasets:[{
data:temps,
borderColor:"#f97316",
backgroundColor:gradient,
fill:true,
tension:0.4
}]
},
options:{
plugins:{legend:{display:false}},
scales:{y:{ticks:{callback:v=>v+"°"}}}
}
});

// FORECAST
const container=document.getElementById("weather");
container.innerHTML="";

for(let i=1;i<=3;i++){

const max=data.daily.temperature_2m_max[i];
const min=data.daily.temperature_2m_min[i];
const cloud=data.daily.cloudcover_mean[i];
const sun=100-cloud;

const rain=data.daily.precipitation_sum[i];
const wind=data.daily.windspeed_10m_max[i];
const uv=data.daily.uv_index_max[i];

container.innerHTML += `
<div class="card">
<div class="day">${new Date(data.daily.time[i]).toLocaleDateString("no-NO",{weekday:"long"})}</div>
<div class="icon">${getIcon(data.daily.weathercode[i])}</div>

<div class="temp-max" style="color:${getTempColor(max)}">${Math.round(max)}°</div>
<div class="temp-min">${Math.round(min)}°</div>

<div class="label">${getSkyText(cloud)}</div>

<div class="label">
☀️ ${sun}% • ☁️ ${cloud}%<br>
🌧️ ${rain} mm<br>
💨 ${wind} m/s<br>
UV ${uv}
</div>
</div>`;
}

}

// HISTORIE
async function loadHistory(){

try{

const res = await fetch("public/history.json");
const history = await res.json();

const labels = history.daily.time.map(d =>
new Date(d).toLocaleDateString("no-NO",{day:"numeric",month:"short"})
);

const todayIndex = Math.floor(labels.length/2);

new Chart(document.getElementById("historyChart"),{

data:{
labels:labels,
datasets:[
{
type:"line",
data:history.daily.temperature_2m_mean,
borderColor:"#ef4444",
fill:false,
tension:0.4,
yAxisID:"y"
},
{
type:"bar",
data:history.daily.precipitation_sum,
backgroundColor:"rgba(59,130,246,0.5)",
yAxisID:"y1"
}
]
},

options:{
plugins:{legend:{display:false}},
scales:{
y:{ticks:{callback:v=>v+"°"}},
y1:{position:"right",grid:{drawOnChartArea:false},ticks:{callback:v=>v+" mm"}}
}
},

plugins:[{
id:"todayLine",
afterDraw(chart){
const {ctx,chartArea:{top,bottom},scales:{x}}=chart;
const xPos = x.getPixelForValue(todayIndex);

ctx.fillStyle="rgba(239,68,68,0.1)";
ctx.fillRect(xPos-10, top, 20, bottom-top);

ctx.beginPath();
ctx.moveTo(xPos, top);
ctx.lineTo(xPos, bottom);
ctx.strokeStyle="red";
ctx.stroke();
}
}]

});

}catch(e){}

}

init();
loadHistory();

</script>

</body>
</html>
