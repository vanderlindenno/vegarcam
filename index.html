<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Vær Vegår</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#eceff4;
  color:#4a5568;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

h2 { margin-bottom:20px; }

/* CURRENT */
.current {
  background:#f4f6fa;
  border-radius:30px;
  padding:20px;
  display:flex;
  align-items:center;
  gap:20px;
  margin-bottom:30px;
}

.current img { width:60px; }
.temp { font-size:42px; font-weight:600; }

/* FORECAST */
.days {
  display:flex;
  gap:20px;
}

.day {
  flex:1;
  background:#f4f6fa;
  border-radius:30px;
  padding:20px;
  text-align:center;
}

.big-icon {
  width:60px;
  margin:10px 0;
}

.max {
  font-size:32px;
  font-weight:600;
}

.min {
  color:#9aa3b2;
  margin-bottom:10px;
}

.row {
  font-size:14px;
  margin:4px 0;
}

/* mobile */
@media (max-width:700px) {
  .days { flex-direction:column; }
}
</style>

</head>

<body>

<div class="container">

<h2>📍 Vegår</h2>

<div id="current" class="current">Laster...</div>

<div id="forecast" class="days"></div>

</div>

<script>
function icon(i) {
  return `https://cdn.jsdelivr.net/gh/metno/weathericons/svg/${i || "cloudy"}.svg`;
}

async function load() {

  try {

    const res = await fetch("weather.json?v=" + Date.now());

    if (!res.ok) throw new Error("Ingen data enda");

    const data = await res.json();

    if (!data.forecast || data.forecast.length === 0) {
      throw new Error("Tom data");
    }

    /* ✅ CURRENT */
    document.getElementById("current").innerHTML = `
      <img src="${icon(data.forecast[0].icon)}"
           onerror="this.src='${icon("cloudy.temperature ? Math.round(data.temperature) + "°C" : "--"}
        </div>
        <div>💧 ${data.humidity ? data.humidity + "%" : "--"}</div>
      </div>
    `;

    /* ✅ FORECAST */
    const f = document.getElementById("forecast");
    f.innerHTML = "";

    data.forecast.forEach(d => {

      const dag = new Date(d.date)
        .toLocaleDateString("no-NO",{weekday:"long"});

      f.innerHTML += `
        <div class="day">

          <div>${dag}</div>

          <img src="${icon(d.icon)}"
               class="big-icon"
               onerror="this.src='${icon("cloudy")und(d.min)}°C</div>

          <div class="row">🌧️ ${d.rain.toFixed(1)} mm</div>
          <div class="row">🌬️ ${d.wind.toFixed(1)} m/s</div>
          <div class="row">☀️ ${d.sun} h</div>
          <div class="row">UV ${d.uv}</div>

        </div>
      `;
    });

  } catch (e) {

    // ✅ NIET blijven hangen!
    document.getElementById("current").innerHTML = `
      <div>Venter på værdata...</div>
    `;

    document.getElementById("forecast").innerHTML = "";

    console.warn("Retry later", e.message);
  }

}

/* ✅ retry elke 10 sec */
load();
setInterval(load, 10000);
</script>

</body>
</html>
