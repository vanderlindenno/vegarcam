<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Værmelding</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f2f4f7;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.wrapper {
    width: 100%;
    max-width: 900px;
}

header {
    text-align: center;
    margin-top: 20px;
}

.label {
    font-size: 0.75rem;
    color: #666;
}

/* CURRENT */
.current-card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
}

.current-grid {
    display: flex;
    gap: 25px;
    align-items: center;
}

.left { flex: 0 0 220px; }
.right { flex: 1; }

.right canvas {
    width: 100%;
    height: 180px !important;
}

.day {
    color: #f97316;
    font-weight: bold;
    font-size: 1.1rem;
}

.icon { font-size: 2.5rem; }

.temp {
    font-size: 3rem;
    font-weight: bold;
    margin: 5px 0;
}

.row {
    font-size: 0.9rem;
    margin: 4px 0;
}

/* FORECAST */
.container {
    display: flex;
    gap: 15px;
    margin-top: 20px;
}

.card {
    flex: 1;
    background: white;
    border-radius: 20px;
    padding: 16px;
    text-align: center;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-4px);
}

.temp-max {
    font-size: 1.8rem;
    font-weight: bold;
}

.temp-min {
    color: #777;
}

.details {
    font-size: 0.85rem;
    margin-top: 8px;
}
</style>
</head>

<body>

<header>
    🇳🇴 Værmelding
    <div class="label">Versjon 7.0</div>
</header>

<div class="wrapper">

<h4>Nåværende måling</h4>
<div id="current"></div>

<h4>Værprognose</h4>
<div class="container" id="weather"></div>

</div>

<script>

// 🌡️ temperatuur kleur functie
function getTempColor(temp){
    if(temp <= 0) return "#3b82f6"; // blauw
    if(temp <= 10) return "#60a5fa";
    if(temp <= 20) return "#f97316";
    if(temp <= 25) return "#ef4444";
    return "#b91c1c"; // heet
}

const lat = 58.79;
const lon = 8.79;

const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,sunshine_duration,uv_index_max&timezone=Europe%2FOslo`;

function getIcon(code){
    if(code === 0) return "☀️";
    if(code <= 3) return "🌤️";
    if(code <= 48) return "☁️";
    if(code <= 67) return "🌧️";
    return "🌥️";
}

function formatDay(date){
    return new Date(date).toLocaleDateString("no-NO",{weekday:"long"});
}

async function init(){

    const [currentRes, forecastRes] = await Promise.all([
        fetch("public/current.json"),
        fetch(url)
    ]);

    const current = await currentRes.json();
    const data = await forecastRes.json();

    // CURRENT
    const tempColor = getTempColor(current.temperature);

    document.getElementById("current").innerHTML = `
    <div class="current-card">
        <div class="current-grid">
            <div class="left">

                <div class="day">I dag</div>
                <div class="icon">🌤️</div>

                <div class="temp" style="color:${tempColor}">
                    ${Math.round(current.temperature)}°C
                </div>

                <div class="row">🌡️ Føles som ${current.feels_like ?? current.temperature}°C</div>
                <div class="row">💧 ${current.humidity}%</div>
                <div class="row">🌫️ Duggpunkt ${current.dew_point ?? "-"}°C</div>
                <div class="row">📊 ${current.pressure} hPa</div>

            </div>

            <div class="right">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <div class="label">
            Oppdatert ${new Date(current.updated).toLocaleTimeString("no-NO")}
        </div>
    </div>
    `;

    // GRAPH
    const now = new Date().getHours();
    const temps = data.hourly.temperature_2m.slice(now, now+12);
    const times = data.hourly.time.slice(now, now+12)
        .map(t => new Date(t).getHours());

    new Chart(document.getElementById("chart"),{
        type:"line",
        data:{
            labels:times,
            datasets:[{
                data:temps,
                borderColor:"#f97316",
                backgroundColor:"rgba(249,115,22,0.2)",
                fill:true,
                tension:0.4,
                pointRadius:2
            }]
        },
        options:{
            plugins:{legend:{display:false}},
            scales:{y:{display:false}}
        }
    });

    // FORECAST DELUXE (alleen volgende 3 dagen)
    const container = document.getElementById("weather");
    container.innerHTML = "";

    for(let i=1;i<=3;i++){

        const max = data.daily.temperature_2m_max[i];
        const min = data.daily.temperature_2m_min[i];

        const rain = data.daily.precipitation_sum[i];
        const wind = data.daily.windspeed_10m_max[i];
        const sun = (data.daily.sunshine_duration[i]/3600).toFixed(1);
        const uv = data.daily.uv_index_max[i];

        const color = getTempColor(max);

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="day">${formatDay(data.daily.time[i])}</div>
            <div class="icon">${getIcon(data.daily.weathercode[i])}</div>

            <div class="temp-max" style="color:${color}">
                ${Math.round(max)}°
            </div>

            <div class="temp-min">
                ${Math.round(min)}°
            </div>

            <div class="details">
                🌧️ ${rain} mm<br>
                💨 ${wind} m/s<br>
                ☀️ ${sun} h<br>
                UV ${uv}
            </div>
        `;

        container.appendChild(card);
    }
}

init();

</script>

</body>
</html>
