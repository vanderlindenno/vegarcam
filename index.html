<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Vær Vegår</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#e9edf3;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card {
  background:#f4f6fa;
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

.temp { font-size:40px; }

.row { font-size:14px; margin-top:4px; }

</style>
</head>

<body>

<div class="container">

<h2>📍 Vegår</h2>

<div id="status">Starter...</div>

<div id="current" class="card"></div>

<div id="forecast"></div>

</div>

<script>

/* ✅ ALTIJD VEILIG ICON */
function safeIcon(icon) {

  const allowed = [
    "cloudy",
    "partlycloudy_day",
    "clearsky_day",
    "rain",
    "rainshowers_day",
    "snow",
    "fog"
  ];

  if (!allowed.includes(icon)) return "cloudy";

  return icon;
}

/* ✅ ICON URL */
function iconUrl(icon) {
  return `https://cdn.jsdelivr.net/gh/metno/weathericons/svg/${safeIcon(icon)}.svg`;
}

async function load() {

  try {
    document.getElementById("status").innerText = "🔄 Laster...";

    const res = await fetch("weather.json?v=" + Date.now());
    const data = await res.json();

    document.getElementById("status").innerText = "✅ Data lastet";

    /* ✅ CURRENT */
    document.getElementById("current").innerHTML = `
      <div class="temp">${data.temperature}°C</div>
      <div>💧 ${data.humidity}%</div>
    `;

    /* ✅ FORECAST */
    const f = document.getElementById("forecast");
    f.innerHTML = "";

    data.forecast.forEach(d => {

      const dag = new Date(d.date).toLocaleDateString("no-NO", {
        weekday:"long"
      });

      // ✅ veilige parsing
      const rain = Number(d.rain || 0).toFixed(1);
      const wind = Number(d.wind || 0).toFixed(1);
      const sun = d.sun ?? "-";
      const uv = d.uv ?? 0;

      f.innerHTML += `
        <div class="card">

          <b>${dag}</b>

          <div>
            <img src="${iconUrl(d.icon)}"
                 width="40"
                 onerror="this.src='${iconUrl("cloudy")}'<div class="row">Nedbør: ${rain} mm</div>
          <div class="row">Vind: ${wind} m/s</div>
          <div class="row">Sol: ${sun} h</div>
          <div class="row">UV: ${uv}</div>

        </div>
      `;
    });

  } catch (e) {

    document.getElementById("status").innerText = "❌ FEIL: " + e.message;

    document.getElementById("current").innerHTML =
      "<b>Kunne ikke laste data</b>";

    console.error(e);
  }
}

load();

</script>

</body>
</html>
