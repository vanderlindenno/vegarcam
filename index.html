<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Vær Vegår</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#e9edf3;
}

.container {
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card {
  background:#f4f6fa;
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

</style>
</head>

<body>

<div class="container">

<h2>📍 Vegår</h2>

<div id="status">Starter...</div>

<div id="current" class="card">Laster...</div>

<div id="forecast"></div>

</div>

<script>
function icon(icon) {
  return `https://cdn.jsdelivr.net/gh/metno/weathericons/svg/${icon || "cloudy"}.svg`;
}

async function load() {
  try {

    document.getElementById("status").innerText = "🔄 Laster weather.json...";

    const res = await fetch("weather.json?v=" + Date.now());

    if (!res.ok) {
      throw new Error("HTTP " + res.status);
    }

    const data = await res.json();

    document.getElementById("status").innerText = "✅ Data lastet";

    /* CURRENT */
    document.getElementById("current").innerHTML = `
      <h3>Temperatur</h3>
      <div>${data.temperature}°C</div>
      <div>💧 ${data.humidity}%</div>
    `;

    /* FORECAST */
    const f = document.getElementById("forecast");
    f.innerHTML = "";

    data.forecast.forEach(d => {

      const dag = new Date(d.date).toLocaleDateString("no-NO", {
        weekday:"long"
      });

      f.innerHTML += `
        <div class="card">

          <h3>${dag}</h3>

          <img src="${icon(d.icon)}" width="Math.round(d.max)}° / ${Math.round(d.min)}°</div>

          <div>Nedbør: ${d.rain}</div>
          <div>Vind: ${d.wind.toFixed(1)}</div>
          <div>Sol: ${d.sun}</div>

        </div>
      `;
    });

  } catch (e) {

    document.getElementById("status").innerHTML =
      "❌ FEIL: " + e.message;

    document.getElementById("current").innerHTML =
      "Kunne ikke laste data";

    console.error(e);
  }
}

load();
</script>

</body>
</html>
