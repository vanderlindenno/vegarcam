
<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Vær Vegår</title>

<style>
body {
  margin:0;
  font-family:-apple-system, sans-serif;
  background: linear-gradient(180deg,#1e3c72,#2a5298,#4facfe);
  color:white;
}

.container {
  max-width:520px;
  margin:auto;
  padding:20px;
}

.card {
  background: rgba(255,255,255,0.12);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  backdrop-filter: blur(12px);
}

.days {
  display:flex;
  gap:12px;
}

.day {
  flex:1;
  background: rgba(255,255,255,0.18);
  border-radius:18px;
  padding:12px;
  text-align:center;
}

.big { font-size:42px; }
.icon { width:50px; height:50px; }
.small { font-size:12px; opacity:0.8; }
.label { font-size:13px; opacity:0.9; margin-bottom:6px; }

.row {
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-top:4px;
}
</style>
</head>

<body>

<div class="container">

<h2>📍 Vegår</h2>

<div class="card" id="current">Laster…</div>

<div class="card">
  <b>3 DAGERS VARSEL</b>
  <div class="days" id="forecast"></div>
</div>

</div>

<script>
async function load(){
  try {
    const res = await fetch("weather.json");
    const data = await res.json();

    console.log(data);

    const time = new Date(data.time.replace(" ","T")+"Z")
      .toLocaleString("no-NO",{ timeZone:"Europe/Oslo" });

    // ✅ CURRENT (simple icon fallback)
    document.getElementById("current").innerHTML = `
      <div class="label">NÅ</div>
      <div class="big">${data.temperature}°C</div>
      💧 ${data.humidity}%<br>
      <div class="small">${time}</div>
    `;

    const f = document.getElementById("forecast");

    if (!data.forecast || data.forecast.length === 0) {
      f.innerHTML = "❌ Ingen værdata";
      return;
    }

    f.innerHTML = "";

    data.forecast.forEach(d => {

      const date = new Date(d.date || d.time);

      const dag = date.toLocaleDateString("no-NO", {
        weekday:"short",
        day:"numeric",
        month:"short",
        timeZone:"Europe/Oslo"
      });

      // ✅ MET.NO ICON
      const icon = d.icon || "cloudy";
      const iconUrl = `https://api.met.no/images/weathericons/svg/${icon}.svg`;

      // ✅ veilige waarden
      const min = (d.min ?? d.temp ?? 0).toFixed(1);
      const max = (d.max ?? d.temp ?? 0).toFixed(1);
      const rain = (d.rain ?? 0).toFixed(1);
      const wind = (d.wind ?? 0).toFixed(1);
      const uv = (d.uv ?? 0).toFixed(1);

      f.innerHTML += `
        <div class="day">

          <div class="label">${dag}</div>

          <img src="${iconUrl}" class="iconax}°</b></div>
          <div class="small">${min}°</div>

          <div class="row"><span>🌧️</span><span>${rain} mm</span></div>
          <div class="row"><span>🌬️</span><span>${wind} m/s</span></div>
          <div class="row"><span>☀️</span><span>UV ${uv}</span></div>

        </div>
      `;
    });

  } catch(e) {
    console.error(e);
    document.getElementById("forecast").innerHTML = "❌ Fout bij laden";
  }
}

load();
</script>

</body>
</html>
