<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Weer Vegår</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #1e3c72, #2a5298, #3ba7f0);
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.location {
  font-size: 20px;
  margin-bottom: 10px;
}

.card {
  background: rgba(255,255,255,0.12);
  border-radius: 25px;
  padding: 20px;
  margin-bottom: 20px;
  backdrop-filter: blur(14px);
}

.title {
  font-size: 13px;
  opacity: 0.8;
}

.temp {
  font-size: 48px;
  font-weight: bold;
}

.icon {
  font-size: 42px;
}

.small {
  font-size: 12px;
  opacity: 0.7;
}

.forecast-row {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="location">📍 Vegår</div>

  <div class="card" id="current">Laden...</div>
  <div class="card" id="forecast">Laden...</div>

  <div class="card">
    <div class="title">📊 Temperatuur verloop</div>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
function getIcon(temp) {
  if (temp <= 0) return "❄️";
  if (temp < 10) return "🌥️";
  if (temp < 20) return "⛅";
  return "☀️";
}

async function loadWeather() {
  const res = await fetch("weather.json");
  const data = await res.json();

  const iconNow = getIcon(data.temperature);

  // ✅ juiste lokale tijd
  const localTime = new Date(data.time).toLocaleString("nl-NL", {
    timeZone: "Europe/Oslo",
    hour: "2-digit",
    minute: "2-digit",
    day: "numeric",
    month: "numeric"
  });

  // CURRENT
  document.getElementById("current").innerHTML = `
    <div class="title">NU</div>
    <div class="icon">${iconNow}</div>
    <div class="temp">${data.temperature}°C</div>
    💧 ${data.humidity}%<br>
    <div class="small">Update: ${localTime}</div>
  `;

  // FORECAST 3 DAGEN
  let html = `<div class="title">FORECAST 3 DAGEN</div>`;

  data.forecast.forEach(f => {
    const icon = getIcon(f.temp);

    const time = new Date(f.time).toLocaleString("nl-NL", {
      timeZone: "Europe/Oslo",
      weekday: "short",
      hour: "2-digit"
    });

    html += `
      <div class="forecast-row">
        <div>${icon}</div>
        <div>${time}</div>
        <div>${f.temp}°C</div>
      </div>
    `;
  });

  document.getElementById("forecast").innerHTML = html;

  // GRAFIEK
  const ctx = document.getElementById("chart").getContext("2d");

  const labels = data.forecast.map(f =>
    new Date(f.time).getHours() + ":00"
  );

  const temps = data.forecast.map(f => f.temp);

  new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        data: temps,
        borderWidth: 2,
        tension: 0.4
      }]
    },
    options: {
      plugins: { legend: { display: false } }
    }
  });
}

loadWeather();
</script>

</body>
</html>
