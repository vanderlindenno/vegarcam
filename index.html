<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Værmelding</title>

<meta name="version" content="3.0.0">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f2f4f7;

    display: flex;
    flex-direction: column;
    align-items: center;
}

/* HEADER */
header {
    text-align: center;
    margin-top: 20px;
}

.version {
    font-size: 0.75rem;
    color: #888;
}

/* CONTAINER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    max-width: 900px;
    padding: 20px;
}

/* CARD BASIS */
.card, .current-card {
    width: 220px;
    background: white;
    border-radius: 20px;
    padding: 18px;
    text-align: center;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
}

/* Current card iets groter */
.current-card {
    width: 260px;
    margin-bottom: 10px;
}

/* TEXT */
.day {
    color: #f97316;
    font-weight: 600;
    margin-bottom: 10px;
}

.icon {
    font-size: 2.2rem;
    margin: 10px 0;
}

.temp-max {
    font-size: 1.7rem;
    font-weight: bold;
}

.temp-min {
    color: #777;
    margin-bottom: 10px;
}

/* ROWS */
.row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    margin: 4px 0;
}

.label {
    margin-top: 8px;
    font-size: 0.75rem;
    color: #666;
}
</style>
</head>

<body>

<header>
    🇳🇴 Værmelding
    <div class="version">Versjon 3.0.0</div>
</header>

<!-- 🔝 CURRENT WEATHER -->
<div id="current"></div>

<!-- 🔽 FORECAST -->
<div class="container" id="weather"></div>

<script>

// ===== LOCATIE =====
const lat = 58.79492656129151;
const lon = 8.790772896300094;

// ===== FORECAST API =====
const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,uv_index_max,sunshine_duration&timezone=Europe%2FOslo`;

// ===== ICONS =====
function getIcon(code){
    if(code === 0) return "☀️";
    if(code <= 3) return "🌤️";
    if(code <= 48) return "☁️";
    if(code <= 67) return "🌧️";
    if(code <= 77) return "❄️";
    if(code >= 95) return "⛈️";
    return "🌥️";
}

// ===== DAG =====
function formatDay(dateStr){
    return new Date(dateStr + "T12:00:00")
        .toLocaleDateString("no-NO", { weekday: "long" });
}

// ===== CURRENT WEATHER (NETATMO JSON) =====
fetch("public/weather.json")
.then(res => res.json())
.then(data => {

    const el = document.getElementById("current");

    const updated = new Date(data.updated).toLocaleTimeString("no-NO", {
        hour: "2-digit",
        minute: "2-digit"
    });

    el.innerHTML = `
        <div class="current-card">
            <div class="day">I dag</div>

            <div class="icon">🌤️</div>

            <div class="temp-max">${Math.round(data.temperature)}°C</div>

            <div class="row">💧 ${data.humidity}%</div>
            <div class="row">📊 ${data.pressure} hPa</div>

            <div class="label">Oppdatert ${updated}</div>
        </div>
    `;
})
.catch(() => {
    document.getElementById("current").innerHTML = "";
});

// ===== FORECAST =====
fetch(url)
.then(res => res.json())
.then(data => {

    const container = document.getElementById("weather");

    for(let i = 0; i < 3; i++){

        const sunHours = (data.daily.sunshine_duration[i] / 3600).toFixed(1);

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="day">${formatDay(data.daily.time[i])}</div>

            <div class="icon">${getIcon(data.daily.weathercode[i])}</div>

            <div class="temp-max">${Math.round(data.daily.temperature_2m_max[i])}°C</div>
            <div class="temp-min">${Math.round(data.daily.temperature_2m_min[i])}°C</div>

            <div class="row">🌧️ ${data.daily.precipitation_sum[i]} mm</div>
            <div class="row">💨 ${data.daily.windspeed_10m_max[i]} m/s</div>
            <div class="row">☀️ ${sunHours} h</div>

            <div class="label">UV ${data.daily.uv_index_max[i]}</div>
        `;

        container.appendChild(card);
    }

});

</script>

</body>
</html>
