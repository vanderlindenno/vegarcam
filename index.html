<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Vær Vegår</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#e9edf3;
  color:#4a5568;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card {
  background:#f4f6fa;
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

.temp {
  font-size:40px;
}

.day-title {
  font-weight:bold;
}

.row {
  font-size:14px;
  margin-top:4px;
}
</style>
</head>

<body>

<div class="container">

<h2>📍 Vegår</h2>

<div id="current" class="card">Laster...</div>

<div id="forecast"></div>

</div>

<script>
function iconUrl(icon) {
  return `https://cdn.jsdelivr.net/gh/metno/weathericons/svg/${icon}.svg`;
}

async function load() {
  try {
    const res = await fetch("weather.json?t=" + Date.now());
    const data = await res.json();

    /* ✅ CURRENT */
    document.getElementById("current").innerHTML = `
      <div class="temp">
        ${data.temperature ? Math.round(data.temperature) + "°C" : "—"}
      </div>
      <div>💧 ${data.humidity ? data.humidity + "%" : "—"}</div>
    `;

    /* ✅ FORECAST */
    const f = document.getElementById("forecast");
    f.innerHTML = "";

    data.forecast.forEach(d => {

      const dag = new Date(d.date).toLocaleDateString("no-NO", {
        weekday:"long"
      });

      f.innerHTML += `
        <div class="card">

          <div class="day-title">${dag}</div>

          <img src="${iconUrl(d.icon)}" width="40th.round(d.max)}°C / ${Math.round(d.min)}°C</div>

          <div class="row">Nedbør: ${d.rain.toFixed(1)} mm</div>
          <div class="row">Vind: ${d.wind.toFixed(1)} m/s</div>
          <div class="row">Sol: ${d.sun} h</div>
          <div class="row">UV: ${d.uv}</div>

        </div>
      `;
    });

  } catch (e) {
    document.getElementById("current").innerHTML =
      "<b>Feil ved lasting av vær</b>";
    console.error(e);
  }
}

load();
</script>

</body>
</html>
