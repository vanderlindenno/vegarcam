<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Vær Vegår</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#e9edf3;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.current, .day {
  background:#f4f6fa;
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

.temp { font-size:40px; }

.red { color:red; }
.green { color:green; }

</style>
</head>

<body>

<div class="container">

<h2>📍 Vegår</h2>

<div id="status">Status: starter...</div>

<div id="current" class="current">Laster...</div>

<div id="forecast"></div>

</div>

<script>
function iconUrl(icon) {
  return `https://cdn.jsdelivr.net/gh/metno/weathericons/svg/${icon}.svg`;
}

async function load() {
  try {
    document.getElementById("status").innerHTML = "🔄 Laster JSON...";

    const res = await fetch("weather.json?test=" + Date.now());

    if (!res.ok) {
      throw new Error("HTTP feil: " + res.status);
    }

    const data = await res.json();

    document.getElementById("status").innerHTML =
      "✅ JSON lastet OK";

    // ✅ CURRENT
    document.getElementById("current").innerHTML = `
      <div class="temp">${data.temperature}°C</div>
      <div>💧 ${data.humidity}%</div>
    `;

    // ✅ FORECAST
    const f = document.getElementById("forecast");
    f.innerHTML = "";

    data.forecast.forEach(d => {

      const dag = new Date(d.date).toLocaleDateString("no-NO", {
        weekday:"long"
      });

      f.innerHTML += `
        <div class="day">

          <div><b>${dag}</b></div>

          <img src="${iconUrl(d.icon)}" width="Math.round(d.max)}°C / ${Math.round(d.min)}°C</div>

          <div>Nedbør: ${d.rain} mm</div>
          <div>Vind: ${d.wind.toFixed(1)} m/s</div>
          <div>Sol: ${d.sun}</div>

        </div>
      `;
    });

  } catch (e) {

    document.getElementById("status").innerHTML =
      "❌ FEIL: " + e.message;

    document.getElementById("current").innerHTML =
      "<div class='red'>Kunne ikke laste data</div>";

    console.error(e);
  }
}

load();
</script>

</body>
</html>
