<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Vær Vegår</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#e9edf3;
  color:#4a5568;
}

.container {
  max-width:900px;
  margin:auto;
  padding:15px;
}

h2 { margin-bottom:15px; }

/* CURRENT */
.current {
  background:#f4f6fa;
  border-radius:25px;
  padding:20px;
  margin-bottom:20px;
  display:flex;
  gap:15px;
  align-items:center;
}

.current img { width:60px; }

.temp {
  font-size:42px;
  font-weight:bold;
}

/* FORECAST */
.days {
  display:flex;
  gap:15px;
}

.day {
  flex:1;
  background:#f4f6fa;
  border-radius:25px;
  padding:20px;
}

.day-inner {
  display:flex;
  gap:15px;
}

.icon-col {
  display:flex;
  flex-direction:column;
  gap:8px;
  align-items:center;
}

.icon-col img { width:28px; }

.data-col { flex:1; }

.title { margin-bottom:6px; }
.day:first-child .title { color:#f97316; }

.max { font-size:26px; font-weight:600; }
.min { color:#9aa3b2; margin-bottom:8px; }

.row {
  display:flex;
  justify-content:space-between;
  font-size:13px;
}

/* version */
.version {
  text-align:center;
  margin-top:20px;
  font-size:12px;
  color:#888;
}

@media (max-width:600px) {
  .days { flex-direction:column; }
}
</style>
</head>

<body>

<div class="container">

<h2>📍 Vegår</h2>

<div id="current" class="current">Laster...</div>
<div id="forecast" class="days"></div>
<div id="version" class="version"></div>

</div>

<script>
const VERSION = new Date().toISOString();

function iconUrl(icon) {
  return `https://cdn.jsdelivr.net/gh/metno/weathericons/svg/${icon}.svg`;
}

async function load() {
  try {
    const res = await fetch("weather.json");
    const data = await res.json();

    if (!data.forecast) throw new Error("Ingen data");

    /* ✅ CURRENT (fallback als 0) */
    const currentIcon = data.forecast[0]?.icon || "cloudy";

    document.getElementById("current").innerHTML = `
      <img src="${iconUrl(currentIcon)}v>
        <div>Nå</div>
        <div class="temp">
          ${data.temperature ? Math.round(data.temperature) + "°C" : "—"}
        </div>
        <div>💧 ${data.humidity ? data.humidity + "%" : "—"}</div>
      </div>
    `;

    /* ✅ FORECAST */
    const f = document.getElementById("forecast");
    f.innerHTML = "";

    data.forecast.forEach(d => {

      const dag = new Date(d.date)
        .toLocaleDateString("no-NO",{weekday:"long"});

      const sun = d.sun ?? "-";

      f.innerHTML += `
        <div class="day">

          <div class="day-inner">

            <div class="icon-col">
              <img src="${iconUrl(d            <img src="${icon         <img src="${iconUrl("wind<img src="${iconUrl("clearsky_day")}       <div class="data-col">

              <div class="title">${dag}</div>

              <div class="max">${Math.round(d.max)}°C</div>
              <div class="min">${Math.round(d.min)}°C</div>

              <div class="row">Nedbør <span>${d.rain.toFixed(1)} mm</span></div>
              <div class="row">Vind <span>${d.wind.toFixed(1)} m/s</span></div>
              <div class="row">Soltimer <span>${sun} h</span></div>
              <div class="row">UV <span>${d.uv}</span></div>

            </div>

          </div>

        </div>
      `;
    });

    document.getElementById("version").innerText = "Versjon: " + VERSION;

  } catch (e) {
    document.getElementById("current").innerText = "Feil ved lasting av værdata";
    console.error(e);
  }
}

load();
</script>

</body>
</html>
