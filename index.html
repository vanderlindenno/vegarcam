<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Værmelding</title>

<meta name="version" content="4.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f2f4f7;
    display: flex;
    flex-direction: column;
    align-items: center;
}

header {
    text-align: center;
    margin-top: 20px;
}

.version {
    font-size: 0.75rem;
    color: #888;
}

.section-title {
    font-size: 0.9rem;
    color: #666;
    margin-top: 15px;
    text-align: center;
}

.wrapper {
    width: 100%;
    max-width: 900px;
}

.container {
    display: flex;
    gap: 16px;
    padding: 20px 0;
}

.current-card, .card {
    flex: 1;
    background: white;
    border-radius: 20px;
    padding: 18px;
    text-align: center;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
}

.day {
    color: #f97316;
    font-weight: 600;
}

.icon {
    font-size: 2rem;
}

.temp-max {
    font-size: 2rem;
    font-weight: bold;
}

.row {
    font-size: 0.9rem;
    margin: 4px 0;
}

.label {
    font-size: 0.75rem;
    color: #666;
}
</style>
</head>

<body>

<header>
    🇳🇴 Værmelding
    <div class="version">Versjon 4.0</div>
</header>

<div class="wrapper">

<div class="section-title">Nåværende måling</div>
<div id="current"></div>

<div class="section-title">Værprognose</div>
<div class="container" id="weather"></div>

</div>

<script>

const lat = 58.79;
const lon = 8.79;

const forecastUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,uv_index_max,sunshine_duration&hourly=temperature_2m&timezone=Europe%2FOslo`;

// helpers
function getIcon(code){
    if(code === 0) return "☀️";
    if(code <= 3) return "🌤️";
    if(code <= 48) return "☁️";
    if(code <= 67) return "🌧️";
    if(code <= 77) return "❄️";
    if(code >= 95) return "⛈️";
    return "🌥️";
}

function dewPoint(t, h){
    const a=17.27, b=237.7;
    const alpha=((a*t)/(b+t))+Math.log(h/100);
    return ((b*alpha)/(a-alpha)).toFixed(1);
}

function feelsLike(t){
    return t.toFixed(1);
}

function formatDay(date){
    return new Date(date).toLocaleDateString("no-NO",{weekday:"long"});
}

// CURRENT
fetch("public/current.json")
.then(r=>r.json())
.then(data=>{

    const updated = new Date(data.updated).toLocaleTimeString("no-NO",{hour:"2-digit",minute:"2-digit"});

    document.getElementById("current").innerHTML = `
    <div class="current-card">
        <div class="day">I dag</div>
        <div class="icon">🌤️</div>

        <div class="temp-max">${Math.round(data.temperature)}°C</div>

        <div class="row">🌡️ Føles som ${feelsLike(data.temperature)}°C</div>
        <div class="row">💧 ${data.humidity}%</div>
        <div class="row">🌫️ Duggpunkt ${dewPoint(data.temperature, data.humidity)}°C</div>
        <div class="row">📊 ${data.pressure} hPa</div>

        <canvas id="chart" height="80"></canvas>

        <div class="label">Oppdatert ${updated}</div>
    </div>
    `;
});

// FORECAST + GRAPH
fetch(forecastUrl)
.then(r=>r.json())
.then(data=>{

    const now = new Date().getHours();

    const temps = data.hourly.temperature_2m.slice(now, now+12);
    const times = data.hourly.time.slice(now, now+12)
        .map(t=> new Date(t).getHours());

    // chart
    new Chart(document.getElementById("chart"),{
        type:"line",
        data:{
            labels:times,
            datasets:[{
                data:temps,
                borderColor:"#f97316",
                backgroundColor:"rgba(249,115,22,0.2)",
                fill:true,
                tension:0.4,
                pointRadius:2
            }]
        },
        options:{
            plugins:{legend:{display:false}},
            scales:{y:{display:false}}
        }
    });

    const container = document.getElementById("weather");

    for(let i=0;i<3;i++){
        const sun=(data.daily.sunshine_duration[i]/3600).toFixed(1);

        const card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <div class="day">${formatDay(data.daily.time[i])}</div>
            <div class="icon">${getIcon(data.daily.weathercode[i])}</div>
            <div class="temp-max">${Math.round(data.daily.temperature_2m_max[i])}°</div>
            <div class="row">${Math.round(data.daily.temperature_2m_min[i])}°</div>
            <div class="row">🌧️ ${data.daily.precipitation_sum[i]} mm</div>
            <div class="row">💨 ${data.daily.windspeed_10m_max[i]} m/s</div>
            <div class="row">☀️ ${sun} h</div>
            <div class="label">UV ${data.daily.uv_index_max[i]}</div>
        `;

        container.appendChild(card);
    }

});
</script>

</body>
</html>
