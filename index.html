<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Vær Vegår</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: linear-gradient(180deg, #1e3c72, #2a5298, #4facfe);
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  backdrop-filter: blur(12px);
}

.days {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.day {
  min-width: 110px;
  background: rgba(255,255,255,0.15);
  padding: 10px;
  border-radius: 15px;
  text-align: center;
}

.icon { font-size: 28px; }
.temp { font-size: 40px; }
</style>
</head>

<body>

<div class="container">

<h2>📍 Vegår</h2>

<div class="card" id="current">Laster...</div>

<div class="card">
  <div>5 DAGERS VARSEL</div>
  <div class="days" id="forecast"></div>
</div>

</div>

<script>
function icon(t){
  if(t < 0) return "❄️";
  if(t < 10) return "🌥️";
  if(t < 20) return "⛅";
  return "☀️";
}

async function load(){
 const res = await fetch("weather.json");
 const data = await res.json();

 // ✅ Correcte tijd fix
 const time = new Date(data.time.replace(" ","T")+"Z")
   .toLocaleString("no-NO",{timeZone:"Europe/Oslo"});

 // ✅ NU
 document.getElementById("current").innerHTML = `
   <div>NÅ</div>
   <div class="icon">${icon(data.temperature)}</div>
   <div class="temp">${data.temperature}°C</div>
   💧 ${data.humidity}%<br>
   <small>${time}</small>
 `;

 // ✅ FORECAST
 const f = document.getElementById("forecast");
 f.innerHTML = "";

 data.forecast.forEach(d => {
   const dt = new Date(d.time);

   const dag = dt.toLocaleDateString("no-NO", {
     weekday: "long",
     timeZone: "Europe/Oslo"
   });

   f.innerHTML += `
     <div class="day">
       <div>${dag}</div>
       <div class="icon">${icon(d.temp)}</div>
       <div>${d.temp}°C</div>
     </div>
   `;
 });
}

load();
</script>

</body>
</html>
``
