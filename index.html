<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Vær Vegår</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #1e3c72, #2a5298, #4facfe);
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.location {
  font-size: 20px;
  margin-bottom: 10px;
}

.card {
  background: rgba(255,255,255,0.12);
  border-radius: 25px;
  padding: 20px;
  margin-bottom: 20px;
  backdrop-filter: blur(14px);
}

.title {
  font-size: 13px;
  opacity: 0.8;
}

.temp {
  font-size: 48px;
  font-weight: bold;
}

.icon {
  font-size: 42px;
}

.small {
  font-size: 12px;
  opacity: 0.7;
}

.row {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="location">📍 Vegår</div>

  <div class="card" id="current">Laster...</div>
  <div class="card" id="forecast">Laster...</div>

  <div class="card">
    <div class="title">📊 Temperatur</div>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
function icon(temp) {
  if (temp <= 0) return "❄️";
  if (temp < 10) return "🌥️";
  if (temp < 20) return "⛅";
  return "☀️";
}

async function load() {
  const res = await fetch("weather.json");
  const data = await res.json();

  // ✅ FIX TIJD (correct parsed + Oslo)
  const time = new Date(data.time.replace(" ", "T") + "Z")
    .toLocaleString("no-NO", {
      timeZone: "Europe/Oslo",
      hour: "2-digit",
      minute: "2-digit",
      day: "numeric",
      month: "numeric"
    });

  // ✅ NÅ
  document.getElementById("current").innerHTML = `
    <div class="title">NÅ</div>
    <div class="icon">${icon(data.temperature)}</div>
    <div class="temp">${data.temperature}°C</div>
    💧 ${data.humidity}%<br>
    <div class="small">Oppdatert: ${time}</div>
  `;

  // ✅ FORECAST (check fix)
  const div = document.getElementById("forecast");

  if (!data.forecast || data.forecast.length === 0) {
    div.innerHTML = "❌ Ingen værdata";
    return;
  }

  let html = `<div class="title">3 DAGER</div>`;

  data.forecast.forEach(f => {
    const t = new Date(f.time).toLocaleString("no-NO", {
      timeZone: "Europe/Oslo",
      weekday: "short",
      hour: "2-digit"
    });

    html += `
      <div class="row">
        <div>${icon(f.temp)}</div>
        <div>${t}</div>
        <div>${f.temp}°C</div>
      </div>
    `;
  });

  div.innerHTML = html;

  // ✅ GRAF
  const ctx = document.getElementById("chart");

  const labels = data.forecast.map(f =>
    new Date(f.time).getHours() + ":00"
  );

  const temps = data.forecast.map(f => f.temp);

  new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        data: temps,
        borderWidth: 2,
        tension: 0.4
      }]
    },
    options: {
      plugins: { legend: { display: false } }
    }
  });
}

load();
</script>

</body>
</html>
