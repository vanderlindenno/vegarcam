<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Værmelding</title>

<meta name="version" content="2.0.0">

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f2f4f7;
    margin: 0;
    color: #333;
}

header {
    text-align: center;
    padding: 15px;
    font-weight: bold;
}

.version {
    font-size: 0.7rem;
    color: #888;
}

.container {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 12px;
}

.card {
    min-width: 200px;
    background: #fff;
    border-radius: 18px;
    padding: 16px;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.day {
    color: #f97316;
    font-weight: 600;
    margin-bottom: 8px;
}

.icon {
    font-size: 2rem;
    margin: 10px 0;
}

.temp-max {
    font-size: 1.6rem;
    font-weight: bold;
}

.temp-min {
    color: #777;
    margin-bottom: 10px;
}

.row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    margin: 3px 0;
}

.label {
    font-size: 0.7rem;
    color: #666;
    margin-top: 6px;
}
</style>
</head>

<body>

<header>
    🇳🇴 Værmelding
    <div class="version">Versjon 2.0.0</div>
</header>

<div class="container" id="weather"></div>

<script>

const lat = 58.79492656129151;
const lon = 8.790772896300094;

const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,uv_index_max,sunshine_duration&timezone=Europe%2FOslo`;

function icon(code){
    if(code === 0) return "☀️";
    if(code <= 3) return "🌤️";
    if(code <= 48) return "☁️";
    if(code <= 67) return "🌧️";
    if(code <= 77) return "❄️";
    if(code <= 95) return "⛈️";
    return "🌥️";
}

function formatDate(d){
    return new Date(d + "T12:00:00").toLocaleDateString("no-NO", {
        weekday: "long"
    });
}

fetch(url)
.then(r => r.json())
.then(data => {

    const container = document.getElementById("weather");

    for(let i = 0; i < 3; i++){

        const sunshineHours = (data.daily.sunshine_duration[i] / 3600).toFixed(1);

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="day">${formatDate(data.daily.time[i])}</div>

            <div class="icon">${icon(data.daily.weathercode[i])}</div>

            <div class="temp-max">${Math.round(data.daily.temperature_2m_max[i])}°C</div>
            <div class="temp-min">${Math.round(data.daily.temperature_2m_min[i])}°C</div>

            <div class="row">🌧️ ${data.daily.precipitation_sum[i]} mm</div>
            <div class="row">💨 ${data.daily.windspeed_10m_max[i]} m/s</div>
            <div class="row">☀️ ${sunshineHours} h</div>

            <div class="label">UV ${data.daily.uv_index_max[i]}</div>
        `;

        container.appendChild(card);
    }

});

</script>

</body>
</html>
