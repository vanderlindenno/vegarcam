<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Værmelding</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f2f4f7;
    display: flex;
    flex-direction: column;
    align-items: center;
}

header {
    margin-top: 20px;
    text-align: center;
}

.wrapper {
    max-width: 900px;
    width: 100%;
}

/* CURRENT CARD */
.current-card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
}

.current-grid {
    display: flex;
    gap: 25px;
    align-items: center;
}

.left {
    flex: 0 0 220px;
}

.right {
    flex: 1;
}

.right canvas {
    width: 100%;
    height: 180px !important;
}

.day { color: #f97316; font-weight: bold; }
.icon { font-size: 2.5rem; }
.temp { font-size: 2.8rem; font-weight: bold; }

.row {
    font-size: 0.9rem;
    margin: 4px 0;
}

.label {
    font-size: 0.75rem;
    color: #666;
}

/* FORECAST */
.container {
    display: flex;
    gap: 15px;
    margin-top: 20px;
}

.card {
    flex: 1;
    background: white;
    border-radius: 20px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<header>
    🇳🇴 Værmelding
    <div class="label">Versjon 6.0</div>
</header>

<div class="wrapper">

<h4>Nåværende måling</h4>
<div id="current"></div>

<h4>Værprognose</h4>
<div class="container" id="weather"></div>

</div>

<script>
const lat = 58.79;
const lon = 8.79;

const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Europe%2FOslo`;

function getIcon(code){
    if(code === 0) return "☀️";
    if(code <= 3) return "🌤️";
    if(code <= 48) return "☁️";
    if(code <= 67) return "🌧️";
    return "🌥️";
}

function formatDay(date){
    return new Date(date).toLocaleDateString("no-NO",{weekday:"long"});
}

async function init(){

    // 1. LOAD DATA (parallel)
    const [currentRes, forecastRes] = await Promise.all([
        fetch("public/current.json"),
        fetch(url)
    ]);

    const current = await currentRes.json();
    const data = await forecastRes.json();

    // 2. BUILD CURRENT CARD
    document.getElementById("current").innerHTML = `
    <div class="current-card">

        <div class="current-grid">
            <div class="left">
                <div class="day">I dag</div>
                <div class="icon">🌤️</div>
                <div class="temp">${Math.round(current.temperature)}°C</div>

                <div class="row">🌡️ Føles som ${current.feels_like ?? current.temperature}°C</div>
                <div class="row">💧 ${current.humidity}%</div>
                <div class="row">🌫️ Duggpunkt ${current.dew_point ?? "-"}°C</div>
                <div class="row">📊 ${current.pressure} hPa</div>
            </div>

            <div class="right">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <div class="label">Oppdatert ${new Date(current.updated).toLocaleTimeString("no-NO")}</div>
    </div>
    `;

    // 3. GRAFIEK (altijd na render!)
    const now = new Date().getHours();
    const temps = data.hourly.temperature_2m.slice(now, now+12);
    const times = data.hourly.time.slice(now, now+12)
        .map(t => new Date(t).getHours());

    new Chart(document.getElementById("chart"),{
        type:"line",
        data:{
            labels: times,
            datasets:[{
                data: temps,
                borderColor:"#f97316",
                backgroundColor:"rgba(249,115,22,0.2)",
                fill:true,
                tension:0.4,
                pointRadius:2
            }]
        },
        options:{
            plugins:{legend:{display:false}},
            scales:{y:{display:false}}
        }
    });

    // 4. FORECAST (ALTijd gevuld)
    const container = document.getElementById("weather");
    container.innerHTML = "";

    for(let i=0;i<3;i++){
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="day">${formatDay(data.daily.time[i])}</div>
            <div class="icon">${getIcon(data.daily.weathercode[i])}</div>
            <div class="temp">${Math.round(data.daily.temperature_2m_max[i])}°</div>
            <div>${Math.round(data.daily.temperature_2m_min[i])}°</div>
        `;

        container.appendChild(card);
    }
}

init();
</script>

</body>
</html>
``
