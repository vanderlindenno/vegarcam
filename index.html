<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Mijn Weerstation</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(to bottom, #4facfe, #00f2fe);
  color: white;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.15);
  border-radius: 25px;
  padding: 20px;
  margin-bottom: 20px;
  backdrop-filter: blur(12px);
}

.title {
  font-size: 14px;
  opacity: 0.8;
}

.temp {
  font-size: 48px;
  font-weight: bold;
}

.icon {
  font-size: 40px;
}

.location {
  font-size: 20px;
  margin-bottom: 10px;
}

.small {
  font-size: 12px;
  opacity: 0.7;
}

canvas {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="location">📍 Mijn locatie</div>

  <div class="card" id="current">
    Laden...
  </div>

  <div class="card" id="forecast">
    Laden...
  </div>

  <div class="card">
    <div class="title">📊 Temperatuur verloop</div>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
// ✅ echte icoontjes op basis van Met.no symbol_code
function getIcon(symbol) {
  if (!symbol) return "❔";

  if (symbol.includes("rain")) return "🌧️";
  if (symbol.includes("cloud")) return "☁️";
  if (symbol.includes("partly")) return "⛅";
  if (symbol.includes("clear")) return "☀️";
  if (symbol.includes("snow")) return "❄️";

  return "🌤️";
}

async function loadWeather() {
  const res = await fetch("weather.json");
  const data = await res.json();

  // 🧠 fallback icon (als symbol nog niet bestaat)
  const iconNow = getIcon(data.symbol || "clear");
  const iconForecast = getIcon(data.symbol || "clear");

  // ✅ CURRENT
  document.getElementById("current").innerHTML = `
    <div class="title">NU</div>
    <div class="icon">${iconNow}</div>
    <div class="temp">${data.temperature}°C</div>
    💧 ${data.humidity}%<br>
    <div class="small">Update: ${data.time}</div>
  `;

  // ✅ FORECAST
  document.getElementById("forecast").innerHTML = `
    <div class="title">FORECAST</div>
    <div class="icon">${iconForecast}</div>
    <div class="temp">${data.forecast_temp}°C</div>
    ⏱️ ${data.forecast_time}
  `;

  // ✅ GRAFIEK (dummy + current/forecast)
  const ctx = document.getElementById('chart').getContext('2d');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Nu', 'Forecast'],
      datasets: [{
        label: 'Temperatuur (°C)',
        data: [data.temperature, data.forecast_temp],
        borderWidth: 2,
        tension: 0.4
      }]
    },
    options: {
      plugins: {
        legend: { display: false }
      }
    }
  });
}

loadWeather();
</script>

</body>
</html>
