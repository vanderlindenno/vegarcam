<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Vær Vegår</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background: linear-gradient(180deg,#1e3c72,#2a5298,#4facfe);
  color:white;
}

.container { max-width:500px; margin:auto; padding:20px; }

.card {
  background: rgba(255,255,255,0.12);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

.days {
  display:flex;
  gap:10px;
}

.day {
  flex:1;
  background: rgba(255,255,255,0.2);
  border-radius:15px;
  padding:12px;
  text-align:center;
}

.big { font-size:42px; }
.icon { font-size:30px; }
.small { font-size:12px; opacity:0.8; margin-top:3px; }
</style>
</head>

<body>

<div class="container">

<h2>📍 Vegår</h2>

<div class="card" id="current"></div>

<div class="card">
  <b>3 DAGERS VARSEL</b>
  <div class="days" id="forecast"></div>
</div>

</div>

<script>
function icon(t){
  if(t < 0) return "❄️";
  if(t < 10) return "🌥️";
  if(t < 20) return "⛅";
  return "☀️";
}

async function load(){
 const res = await fetch("weather.json");
 const data = await res.json();

 const time = new Date(data.time.replace(" ","T")+"Z")
   .toLocaleString("no-NO",{timeZone:"Europe/Oslo"});

 // ✅ current
 document.getElementById("current").innerHTML = `
   <div>NÅ</div>
   <div class="icon">${icon(data.temperature)}</div>
   <div class="big">${data.temperature}°C</div>
   💧 ${data.humidity}%<br>
   <div class="small">${time}</div>
 `;

 const f = document.getElementById("forecast");
 f.innerHTML = "";

 data.forecast.forEach(d => {

   const dt = new Date(d.time);

   const dag = dt.toLocaleDateString("no-NO", {
     weekday:"short",
     day:"numeric",
     month:"short",
     timeZone:"Europe/Oslo"
   });

   f.innerHTML += `
     <div class="day">
       <div>${dag}</div>

       <div class="icon">${icon(d.temp)}</div>

       <div>${d.max.toFixed(1)}°</div>
       <div class="small">${d.min.toFixed(1)}°</div>

       <div class="small">🌧️ ${d.rain} mm</div>
       <div class="small">🌬️ ${d.wind} m/s</div>
       <div class="small">☀️ UV ${d.uv}</div>
     </div>
   `;
 });
}

load();
</script>

</body>
</html>
``
