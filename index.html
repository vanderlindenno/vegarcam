<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Vær Vegår</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#eceff4;
  color:#4a5568;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* HEADER */
h2 {
  margin-bottom:20px;
}

/* ✅ CURRENT */
.current {
  background:#f4f6fa;
  border-radius:30px;
  padding:20px;
  display:flex;
  align-items:center;
  gap:20px;
  margin-bottom:30px;
}

.current img {
  width:60px;
}

.temp {
  font-size:42px;
  font-weight:600;
}

/* ✅ FORECAST */
.days {
  display:flex;
  gap:20px;
}

/* kaart */
.day {
  flex:1;
  background:#f4f6fa;
  border-radius:30px;
  padding:20px;
  text-align:center;
  box-shadow:0 4px 15px rgba(0,0,0,0.06);
}

/* titel */
.title {
  font-size:18px;
  margin-bottom:10px;
  text-transform:capitalize;
}

.day:first-child .title {
  color:#f97316;
  font-weight:600;
}

/* icon */
.big-icon {
  width:60px;
  height:60px;
  margin:10px 0;
}

/* temp */
.max {
  font-size:32px;
  font-weight:600;
}

.min {
  font-size:18px;
  color:#9aa3b2;
  margin-bottom:15px;
}

/* rows */
.row {
  display:flex;
  justify-content:center;
  gap:6px;
  font-size:14px;
  margin:4px 0;
}

/* kleine iconen */
.small-icon {
  width:18px;
}

/* mobiel */
@media (max-width:700px) {
  .days {
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="container">

<h2>📍 Vegår</h2>

<!-- ✅ CURRENT -->
<div id="current" class="current">Laster...</div>

<!-- ✅ FORECAST -->
<div id="forecast" class="days"></div>

</div>

<script>
function icon(icon) {
  return `https://cdn.jsdelivr.net/gh/metno/weathericons/svg/${icon || "cloudy"}.svg`;
}

async function load() {

  const res = await fetch("weather.json?x=" + Date.now());
  const data = await res.json();

  /* ✅ CURRENT */
  const currentIcon = data.forecast[0]?.icon || "cloudy";

  document.getElementById("current").innerHTML = `
    <img src="${icon(currentIcon)}" onerror="this.src='${icon('cloudy')}'a.temperature ? Math.round(data.temperature) + "°C" : "—"}
      </div>
      <div>💧 ${data.humidity ? data.humidity + "%" : "—"}</div>
    </div>
  `;

  /* ✅ FORECAST */
  const f = document.getElementById("forecast");
  f.innerHTML = "";

  data.forecast.forEach(d => {

    const dag = new Date(d.date)
      .toLocaleDateString("no-NO",{weekday:"long"});

    f.innerHTML += `
      <div class="day">

        <div class="title">${dag}</div>

        <img src="${icon(d.icon)}" class="big-icon"
             onerror="this.src='${icon('cloudy')in">${Math.round(d.min)}°C</div>

        <div class="row">
          <img src="${icon('rain')}" class="small-icon      </div>

        <div class="row">
          <img src="${icon('wind')}" class="smallm/s
        </div>

        <div class="row">
          <img src="${icon('clearsky_day')}" class="small      <div class="row">
          UV ${d.uv}
        </div>

      </div>
    `;
  });
}

load();
</script>

</body>
</html>
