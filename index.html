<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Vær Vegår</title>

<style>
body {
  margin:0;
  font-family:-apple-system, sans-serif;
  background: linear-gradient(180deg,#1e3c72,#2a5298,#4facfe);
  color:white;
}

.container {
  max-width:520px;
  margin:auto;
  padding:20px;
}

.card {
  background: rgba(255,255,255,0.12);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

.days {
  display:flex;
  gap:10px;
}

.day {
  flex:1;
  background: rgba(255,255,255,0.18);
  border-radius:15px;
  padding:12px;
  text-align:center;
}

.big { font-size:42px; }
.icon { width:50px; height:50px; }
.small { font-size:12px; opacity:0.8; }
.label { font-size:13px; margin-bottom:5px; }

.row {
  display:flex;
  justify-content:space-between;
  font-size:12px;
}
</style>

</head>
<body>

<div class="container">

<h2>📍 Vegår</h2>

<div class="card" id="current">Laster...</div>

<div class="card">
  <b>3 DAGERS VARSEL</b>
  <div class="days" id="forecast"></div>
</div>

</div>

<script>
async function load() {
  const res = await fetch("weather.json");
  const data = await res.json();

  const time = new Date(data.time.replace(" ","T")+"Z")
    .toLocaleString("no-NO",{timeZone:"Europe/Oslo"});

  // ✅ CURRENT
  document.getElementById("current").innerHTML = `
    <div class="label">NÅ</div>
    <div class="big">${data.temperature}°C</div>
    💧 ${data.humidity}%<br>
    <div class="small">${time}</div>
  `;

  const f = document.getElementById("forecast");
  f.innerHTML = "";

  data.forecast.forEach(d => {

    const date = new Date(d.date);

    const dag = date.toLocaleDateString("no-NO", {
      weekday:"short", day:"numeric", month:"short",
      timeZone:"Europe/Oslo"
    });

    const iconUrl = `https://cdn.jsdelivr.net/gh/metno/weathericons/svg/${d.icon}.svg`;

    f.innerHTML += `
      <div class="day">

        <div class="label">${dag}</div>

        <img src="${iconUrl}" class="iconax.toFixed(1)}°</b></div>
        <div class="small">${d.min.toFixed(1)}°</div>

        <div class="row">🌧️ <span>${d.rain.toFixed(1)} mm</span></div>
        <div class="row">🌬️ <span>${d.wind.toFixed(1)} m/s</span></div>
        <div class="row">☀️ <span>UV ${d.uv.toFixed(1)}</span></div>

      </div>
    `;
  });
}

load();
</script>

</body>
</html>
