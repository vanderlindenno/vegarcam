<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Værmelding</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f2f4f7;
    display:flex;
    flex-direction:column;
    align-items:center;
}

header{
    text-align:center;
    margin-top:20px;
}

.wrapper{
    max-width:900px;
    width:100%;
    padding:0 12px;
}

.current-card,.card{
    background:white;
    border-radius:24px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* CURRENT */
.current-card{ padding:18px; }

.current-grid{
    display:flex;
    gap:20px;
    align-items:center;
}

.left{ flex:0 0 180px; }
.right{ flex:1; }

.right canvas{
    width:100%;
    height:200px !important;
}

/* TEXT */
.temp{ font-size:3rem; font-weight:bold; }
.icon{ font-size:2.4rem; }
.day{ color:#f97316; font-weight:bold; }
.label{ font-size:0.75rem; color:#777; }
.row{ margin:5px 0; }

/* FORECAST */
.container{
    display:flex;
    gap:14px;
    overflow-x:auto;
    padding-bottom:8px;
}

.card{
    min-width:140px;
    padding:14px;
    text-align:center;
}

.temp-max{ font-size:1.5rem; font-weight:bold; }
.temp-min{ color:#666; }

/* HISTORY */
.history-card{ padding:15px; }
#historyChart{ height:230px !important; }

/* RADAR */
.radar-card{
    overflow:hidden;
    position:relative;
}

.radar-card iframe{
    width:100%;
    height:380px;
    border:none;
}

.radar-overlay{
    position:absolute;
    top:12px;
    left:12px;
    background:rgba(0,0,0,0.6);
    color:white;
    padding:6px 12px;
    border-radius:12px;
    font-size:0.8rem;
}

/* MOBILE */
@media(max-width:600px){
    .current-grid{
        flex-direction:column;
        align-items:flex-start;
    }

    .left,.right{ width:100%; }

    .right canvas{ height:170px !important; }

    .temp{ font-size:2.3rem; }

    .radar-card iframe{ height:300px; }
}
</style>
</head>

<body>

<header>
🇳🇴 Værmelding
<div class="label">v18 Apple style</div>
</header>

<div class="wrapper">

<h4>Nåværende måling</h4>
<div id="current"></div>

<h4>Værprognose</h4>
<div id="weather" class="container"></div>

<h4>Historisk vær fra i fjor</h4>
<div class="current-card history-card">
<canvas id="historyChart"></canvas>
</div>

<h4>Nedbør radar</h4>
<div class="current-card radar-card">
<div class="radar-overlay">🌧️ Live nedbør radar</div>

<iframe src="https://embed.windy.com/embed2.html?lat=58.79&lon=8.79&zoom=12&overlay=satellite&level=surface&menu=&message=true"></iframe>

</div>

</div>

<script>

// HELPERS
function getTempColor(t){
if(t<=0) return "#3b82f6";
if(t<=10) return "#60a5fa";
if(t<=20) return "#f97316";
return "#ef4444";
}

function getSkyText(c){
if(c<20) return "Skyfri";
if(c<50) return "Delvis skyet";
if(c<80) return "Skyet";
return "Overskyet";
}

function getIcon(code){
if(code===0) return "☀️";
if(code<=3) return "🌤️";
if(code<=48) return "☁️";
if(code<=67) return "🌧️";
return "🌥️";
}

// FETCH
const lat=58.79, lon=8.79;
const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,uv_index_max,cloudcover_mean&timezone=Europe%2FOslo`;

async function init(){

const [cRes,fRes]=await Promise.all([
fetch("public/current.json"),
fetch(url)
]);

const current=await cRes.json();
const data=await fRes.json();

const feels=(current.temperature-(1-current.humidity/100)*2).toFixed(1);

// CURRENT
document.getElementById("current").innerHTML=`
<div class="current-card">
<div class="current-grid">

<div class="left">
<div class="day">I dag</div>
<div class="icon">${getIcon(data.daily.weathercode[0])}</div>

<div class="temp" style="color:${getTempColor(current.temperature)}">
${Math.round(current.temperature)}°C
</div>

<div class="row">🌡️ ${feels}°</div>
<div class="row">💧 ${current.humidity}%</div>
<div class="row">📊 ${current.pressure || "--"} hPa</div>
</div>

<div class="right">
<canvas id="chart"></canvas>
</div>

</div>
<div class="label">Oppdatert ${new Date(current.updated).toLocaleTimeString("no-NO")}</div>
</div>
`;

// GRAPH
const now=new Date().getHours();
const temps=data.hourly.temperature_2m.slice(now,now+12);
const times=data.hourly.time.slice(now,now+12)
.map(t=>new Date(t).getHours());

const ctx=document.getElementById("chart").getContext("2d");

const gradient=ctx.createLinearGradient(0,0,0,200);
gradient.addColorStop(0,"rgba(249,115,22,0.5)");
gradient.addColorStop(1,"rgba(249,115,22,0)");

new Chart(ctx,{
type:"line",
data:{
labels:times,
datasets:[{
data:temps,
borderColor:"#f97316",
backgroundColor:gradient,
fill:true,
tension:0.4,
pointRadius:3
}]
},
options:{
plugins:{
legend:{display:false},
tooltip:{
backgroundColor:"#111",
titleColor:"#fff",
bodyColor:"#fff",
displayColors:false,
callbacks:{ label:c=>c.raw+"°C" }
}
},
scales:{ x:{grid:{display:false}}, y:{display:false} }
}
});

// FORECAST
const container=document.getElementById("weather");

for(let i=1;i<=3;i++){
const d=data.daily;

container.innerHTML+=`
<div class="card">
<div class="day">${new Date(d.time[i]).toLocaleDateString("no-NO",{weekday:"long"})}</div>
<div class="icon">${getIcon(d.weathercode[i])}</div>

<div class="temp-max" style="color:${getTempColor(d.temperature_2m_max[i])}">
${Math.round(d.temperature_2m_max[i])}°
</div>

<div class="temp-min">${Math.round(d.temperature_2m_min[i])}°</div>
<div class="label">${getSkyText(d.cloudcover_mean[i])}</div>

<div class="label">
🌧️ ${d.precipitation_sum[i]} mm<br>
💨 ${d.windspeed_10m_max[i]} m/s<br>
UV ${d.uv_index_max[i]}
</div>
</div>`;
}

}

// HISTORY
async function loadHistory(){

try{

const res=await fetch("public/history.json");
const history=await res.json();

// ✅ juiste "vandaag"
const todayStr=new Date().toISOString().split("T")[0];
const todayIndex=history.daily.time.findIndex(d=>d===todayStr);

const labels=history.daily.time.map(d=>
new Date(d).toLocaleDateString("no-NO",{day:"numeric",month:"short"})
);

new Chart(document.getElementById("historyChart"),{

data:{
labels,
datasets:[
{
type:"line",
data:history.daily.temperature_2m_mean,
borderColor:"#ef4444",
tension:0.4,
pointRadius:0
},
{
type:"bar",
data:history.daily.precipitation_sum,
backgroundColor:"rgba(59,130,246,0.4)"
}
]
},

options:{
plugins:{legend:{display:false}},
scales:{
y:{ticks:{callback:v=>v+"°"}},
y1:{display:false}
}
},

plugins:[{
id:"todayLine",
afterDraw(chart){

if(todayIndex===-1) return;

const {ctx,chartArea:{top,bottom},scales:{x}}=chart;
const xPos=x.getPixelForValue(todayIndex);

// zachte highlight
ctx.fillStyle="rgba(249,115,22,0.12)";
ctx.fillRect(xPos-15,top,30,bottom-top);

// lijn
ctx.beginPath();
ctx.moveTo(xPos,top);
ctx.lineTo(xPos,bottom);
ctx.strokeStyle="#f97316";
ctx.lineWidth=2;
ctx.stroke();

// label
ctx.fillStyle="#f97316";
ctx.font="12px -apple-system";
ctx.textAlign="center";
ctx.fillText("i dag",xPos,top-5);
}
}]

});

}catch(e){}

}

init();
loadHistory();

</script>

</body>
</html>
