<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Værmelding</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f2f4f7;
}

/* ✅ CENTERED LAYOUT */
.wrapper{
    width:100%;
    max-width:1200px;
    margin:0 auto;
    padding:14px;
    box-sizing:border-box;
}

/* HEADER */
header{
    text-align:center;
    margin:20px 0 10px;
}

h4{
    margin:22px 6px 12px;
}

/* CARDS */
.current-card,
.card,
.history-card,
.radar-card{
    width:100%;
    background:white;
    border-radius:22px;
    box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

/* ✅ CURRENT */
.current-card{
    padding:16px;
}

.current-grid{
    display:flex;
    gap:20px;
    align-items:flex-start;
}

/* FIX BALANS */
.left{
    flex:0 0 220px;
}

.right{
    flex:1;
    max-width:700px;
    min-width:0;
}

.right canvas{
    width:100% !important;
    height:220px !important;
}

/* TEXT */
.temp{
    font-size:2.8rem;
    font-weight:bold;
}

.icon{font-size:2.2rem;}
.day{color:#f97316;font-weight:bold;}
.label{font-size:0.75rem;color:#777;}
.row{margin:6px 0;}

/* ✅ SMART FORECAST GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:14px;
}

/* CARD */
.card{
    padding:14px;
    text-align:center;
}

/* HISTORY */
.history-card{
    padding:12px;
}

#historyChart{
    width:100% !important;
    height:260px !important;
}

/* RADAR */
.radar-card{
    position:relative;
    overflow:hidden;
}

.radar-card iframe{
    width:100%;
    height:420px;
    border:none;
}

.radar-overlay{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.6);
    color:white;
    padding:6px 12px;
    border-radius:10px;
}

/* ✅ MOBILE */
@media(max-width:700px){

    .container{
        grid-template-columns:1fr;
    }

    .current-grid{
        flex-direction:column;
    }

    .left,.right{
        width:100%;
        max-width:100%;
    }

    .temp{
        font-size:2.2rem;
    }

    .right canvas{
        height:170px !important;
    }

    .radar-card iframe{
        height:300px;
    }
}

</style>
</head>

<body>

<header>
🇳🇴 Værmelding
<div class="label">v22 pro layout</div>
</header>

<div class="wrapper">

<h4>Nå situasjon</h4>
<div id="current"></div>

<h4>Værprognose</h4>
<div id="weather" class="container"></div>

<h4>Historisk vær fra i fjor</h4>
<div class="history-card">
    <canvas id="historyChart"></canvas>
</div>

<h4>Nedbør radar</h4>
<div class="radar-card">
<div class="radar-overlay">🌧️ Live nedbør radar</div>
<iframe src="https://embed.windy.com/embed2.html?lat=58.79&lon=8.79&zoom=12&overlay=radar"></iframe>
</div>

</div>

<script>

/* HELPERS */

function getTempColor(t){
    if(t<=0) return "#3b82f6";
    if(t<=10) return "#60a5fa";
    if(t<=20) return "#f97316";
    return "#ef4444";
}

function getIcon(code){
    if(code===0) return "☀️";
    if(code<=3) return "🌤️";
    if(code<=48) return "☁️";
    if(code<=67) return "🌧️";
    return "🌥️";
}

/* CONFIG */
const lat=58.79, lon=8.79;

const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,uv_index_max,cloudcover_mean&timezone=Europe%2FOslo`;

async function init(){

const [cRes,fRes]=await Promise.all([
fetch("public/current.json"),
fetch(url)
]);

const current=await cRes.json();
const data=await fRes.json();

/* CURRENT */
document.getElementById("current").innerHTML=`
<div class="current-card">
<div class="current-grid">

<div class="left">
<div class="day">Nåværende måling</div>
<div class="icon">${getIcon(data.daily.weathercode[0])}</div>

<div class="temp" style="color:${getTempColor(current.temperature)}">
${Math.round(current.temperature)}°C
</div>

<div class="row">🌡️ ${current.temperature}°</div>
<div class="row">💧 ${current.humidity}%</div>
<div class="row">📊 ${current.pressure || "--"} hPa</div>
</div>

<div class="right">
<canvas id="chart"></canvas>
</div>

</div>
</div>`;

/* GRAPH */

const now=new Date().getHours();
const temps=data.hourly.temperature_2m.slice(now,now+12);
const times=data.hourly.time.slice(now,now+12).map(t=>new Date(t).getHours());

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:times,
datasets:[{
data:temps,
borderColor:"#f97316",
fill:true,
tension:0.4
}]
},
options:{
plugins:{legend:{display:false}},
scales:{x:{display:false},y:{display:false}}
}
});

/* FORECAST */

const container=document.getElementById("weather");

for(let i=1;i<=3;i++){
const d=data.daily;

container.innerHTML+=`
<div class="card">
<div class="day">${new Date(d.time[i]).toLocaleDateString("no-NO",{weekday:"long"})}</div>

<div class="icon">${getIcon(d.weathercode[i])}</div>

<div style="color:${getTempColor(d.temperature_2m_max[i])}">
${Math.round(d.temperature_2m_max[i])}°
</div>

<div>${Math.round(d.temperature_2m_min[i])}°</div>

<div class="label">
🌧️ ${d.precipitation_sum[i]} mm<br>
💨 ${d.windspeed_10m_max[i]} m/s<br>
UV ${d.uv_index_max[i]}
</div>
</div>`;
}

}

/* HISTORY */

async function loadHistory(){

const res=await fetch("public/history.json");
const history=await res.json();

new Chart(document.getElementById("historyChart"),{

data:{
labels:history.daily.time,
datasets:[
{
type:"line",
data:history.daily.temperature_2m_mean,
borderColor:"#ef4444",
tension:0.4
},
{
type:"bar",
data:history.daily.precipitation_sum,
backgroundColor:"rgba(59,130,246,0.4)"
}
]
},

options:{
plugins:{legend:{display:false}},
scales:{y:{ticks:{callback:v=>v+"°"}}}
}

});

}

init();
loadHistory();

</script>

</body>
</html>
