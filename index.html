<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Værmelding</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f2f4f7;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.wrapper {
    max-width: 900px;
    width: 100%;
}

/* CURRENT */
.current-card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 260px;
}

.current-grid {
    display: flex;
    gap: 30px;
    align-items: center;
}

.left {
    flex: 0 0 220px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.right {
    flex: 1;
}

.right canvas {
    width: 100%;
    height: 200px !important;
}

.day {
    color: #f97316;
    font-weight: bold;
}

.icon {
    font-size: 2.5rem;
}

.temp {
    font-size: 3rem;
    font-weight: bold;
}

/* FORECAST */
.container {
    display: flex;
    gap: 16px;
    margin-top: 20px;
}

.card {
    flex: 1;
    background: white;
    border-radius: 20px;
    padding: 16px;
    text-align: center;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
}

/* helpers */
.label { font-size: 0.75rem; color:#666; }
.row { font-size:0.9rem; margin:4px 0; }

.temp-max { font-size:1.6rem; font-weight:bold; }
.temp-min { color:#777; }

</style>
</head>

<body>

<h3>🇳🇴 Værmelding</h3>

<div class="wrapper">

<h4>Nåværende måling</h4>
<div id="current"></div>

<h4>Værprognose</h4>
<div class="container" id="weather"></div>

</div>

<script>

// 🌡️ kleur
function getTempColor(temp){
    if(temp <= 0) return "#3b82f6";
    if(temp <= 10) return "#60a5fa";
    if(temp <= 20) return "#f97316";
    if(temp <= 25) return "#ef4444";
    return "#b91c1c";
}

function getIcon(code){
    if(code === 0) return "☀️";
    if(code <= 3) return "🌤️";
    if(code <= 48) return "☁️";
    if(code <= 67) return "🌧️";
    return "🌥️";
}

function formatDay(date){
    return new Date(date).toLocaleDateString("no-NO",{weekday:"long"});
}

const lat = 58.79;
const lon = 8.79;

const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,sunshine_duration,uv_index_max&timezone=Europe%2FOslo`;

async function init(){

    const [currentRes, forecastRes] = await Promise.all([
        fetch("public/current.json"),
        fetch(url)
    ]);

    const current = await currentRes.json();
    const data = await forecastRes.json();

    const tempColor = getTempColor(current.temperature);

    // CURRENT UI
    document.getElementById("current").innerHTML = `
    <div class="current-card">
        <div class="current-grid">

            <div class="left">
                <div class="day">I dag</div>
                <div class="icon">🌤️</div>
                <div class="temp" style="color:${tempColor}">
                    ${Math.round(current.temperature)}°C
                </div>

                <div class="row">🌡️ Føles som ${current.feels_like ?? current.temperature}°C</div>
                <div class="row">💧 ${current.humidity}%</div>
                <div class="row">📊 ${current.pressure} hPa</div>
            </div>

            <div class="right">
                <canvas id="chart"></canvas>
            </div>

        </div>

        <div class="label">
            Oppdatert ${new Date(current.updated).toLocaleTimeString("no-NO")}
        </div>
    </div>
    `;

    // CHART DATA
    const nowHour = new Date().getHours();
    const temps = data.hourly.temperature_2m.slice(nowHour, nowHour+12);
    const times = data.hourly.time.slice(nowHour, nowHour+12)
        .map(t => new Date(t).getHours());

    // 📍 NU lijn plugin
    const nowLine = {
        id: 'nowLine',
        afterDraw(chart) {
            const {ctx, chartArea:{top,bottom}, scales:{x}} = chart;

            const index = chart.data.labels.indexOf(nowHour);
            if(index === -1) return;

            const xPos = x.getPixelForValue(index);

            ctx.save();
            ctx.beginPath();
            ctx.moveTo(xPos, top);
            ctx.lineTo(xPos, bottom);
            ctx.lineWidth = 2;
            ctx.strokeStyle = "red";
            ctx.stroke();
            ctx.restore();
        }
    };

    // 🌈 gradient
    const ctx = document.getElementById("chart").getContext("2d");
    const gradient = ctx.createLinearGradient(0,0,0,200);
    gradient.addColorStop(0, "rgba(249,115,22,0.5)");
    gradient.addColorStop(1, "rgba(249,115,22,0)");

    new Chart(ctx,{
        type:"line",
        data:{
            labels: times,
            datasets:[{
                data: temps,
                borderColor:"#f97316",
                backgroundColor:gradient,
                fill:true,
                tension:0.4,
                pointRadius:2
            }]
        },
        options:{
            plugins:{legend:{display:false}},
            scales:{
                y:{
                    display:true,
                    ticks:{ callback:v => v + "°" },
                    grid:{ color:"rgba(0,0,0,0.05)" }
                }
            }
        },
        plugins:[nowLine]
    });

    // FORECAST
    const container = document.getElementById("weather");
    container.innerHTML = "";

    for(let i=1;i<=3;i++){

        const max = data.daily.temperature_2m_max[i];
        const color = getTempColor(max);

        const card = document.createElement("div");

        card.className="card";
        card.innerHTML=`
            <div class="day">${formatDay(data.daily.time[i])}</div>
            <div class="icon">${getIcon(data.daily.weathercode[i])}</div>

            <div class="temp-max" style="color:${color}">
                ${Math.round(max)}°
            </div>

            <div class="temp-min">
                ${Math.round(data.daily.temperature_2m_min[i])}°
            </div>

            <div class="label">
                🌧️ ${data.daily.precipitation_sum[i]} mm •
                💨 ${data.daily.windspeed_10m_max[i]} m/s<br>
                ☀️ ${(data.daily.sunshine_duration[i]/3600).toFixed(1)} h •
                UV ${data.daily.uv_index_max[i]}
            </div>
        `;

        container.appendChild(card);
    }
}

init();
</script>

</body>
</html>
